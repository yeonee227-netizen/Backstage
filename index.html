/* 저장 어댑터: 아티팩트(window.storage) → 브라우저(localStorage) → 메모리 순으로 자동 선택 */
const store = {
  mem: {},
  async get(k) {
    try { if (window.storage && window.storage.get) { const r = await window.storage.get(k); if (r && r.value !== undefined) return r.value; } } catch (e) {}
    try { const v = localStorage.getItem(k); if (v !== null) return v; } catch (e) {}
    return this.mem[k] !== undefined ? this.mem[k] : null;
  },
  async set(k, v) {
    try { if (window.storage && window.storage.set) { const r = await window.storage.set(k, v); if (r) return true; } } catch (e) {}
    try { localStorage.setItem(k, v); if (localStorage.getItem(k) === v) return true; } catch (e) {}
    this.mem[k] = v;
    return false;
  },
};

/* 백업 파일 내보내기: 항상 동일한 이름(BACKSTAGE.json)으로 저장 */
const exportBackup = (data) => {
  const name = "BACKSTAGE.json";
  try {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 900);
  } catch (e) {}
  return name;
};

const lessonNoOf = (events, ev) => {
  if (!ev.groupId) return null;
  const seq = events.filter((e) => e.groupId === ev.groupId).slice().sort((a, b) => a.date.localeCompare(b.date));
  const i = seq.findIndex((e) => e.id === ev.id);
  if (i < 0) return null;
  const n = ev.payCycle && ev.payCycle.n;
  return n ? (i % n) + 1 : i + 1;
};
/* 그룹의 남은 레슨을 날짜순으로 다시 세어 입금 주기 패턴(매 1회차 입금)을 재적용 */
const recalcGroupFees = (s, groupId) => {
  if (!groupId) return s;
  const seq = s.events.filter((e) => e.groupId === groupId).slice().sort((a, b) => a.date.localeCompare(b.date));
  const ref = seq.find((e) => e.payCycle && e.payAmount > 0);
  if (!ref) return s;
  const feeById = {};
  seq.forEach((e, i) => { feeById[e.id] = payOnSeq(i + 1, ref.payCycle) ? ref.payAmount : 0; });
  const events = s.events.map((e) => {
    const nf = feeById[e.id];
    if (nf === undefined || nf === e.fee) return e;
    return { ...e, fee: nf, paid: nf > 0 ? e.paid : false, paidDate: nf > 0 ? e.paidDate : "" };
  });
  const transactions = s.transactions.filter((t) => {
    if (!t.eventId) return true;
    const nf = feeById[t.eventId];
    return nf === undefined || nf > 0;
  });
  return { ...s, events, transactions };
};

const repShift = (dateKey, kind, i) => {
  const d0 = parseKey(dateKey);
  if (kind === "매주") return keyOf(new Date(d0.getFullYear(), d0.getMonth(), d0.getDate() + 7 * i));

};

function normalizeBackup(obj) {
  const base = emptyData();
  const out = { ...base, ...obj };
  out.settings = { ...base.settings, ...(obj && obj.settings ? obj.settings : {}) };
  ["values", "eventTypes", "incomeCats", "expenseCats", "journalKinds", "instruments", "ensembles"].forEach((k) => {
    if (!Array.isArray(out.settings[k]) || !out.settings[k].length) out.settings[k] = base.settings[k];
  });
  if (!Array.isArray(out.settings.curriculum)) out.settings.curriculum = base.settings.curriculum;
  out.settings.ensembles = out.settings.ensembles.filter((e) => e && e.name).map((e) => (e.en ? e : { ...e, en: ENBY[e.size] || "" }));
  if (!out.settings.homeWidgets || typeof out.settings.homeWidgets !== "object") out.settings.homeWidgets = base.settings.homeWidgets;
  if (!out.settings.pracNames || typeof out.settings.pracNames !== "object") out.settings.pracNames = base.settings.pracNames;
  ["events", "todos", "students", "tasks", "routine", "scores", "venues", "transactions", "journal", "memos"].forEach((k) => {
    if (!Array.isArray(out[k])) out[k] = [];
  });
  if (!out.routineChecks || typeof out.routineChecks !== "object") out.routineChecks = {};
  /* 구버전 데이터 → 메모 시스템 자동 이관 (일지 카테고리→메모 블록, 일지·과제→날짜 메모) */
  if (!obj || !Array.isArray(obj.memoBlocks)) {
    const blocks = [];
    const memos = [];
    if (out.journal.length) {
      const byName = {};
      (out.settings.journalKinds || []).forEach((k) => { const b = { id: uid(), name: k.name }; blocks.push(b); byName[k.name] = b.id; });
      out.journal.forEach((j) => {
        let bId = byName[j.kind];
        if (!bId) { const b = { id: uid(), name: j.kind || "일지" }; blocks.push(b); byName[b.name] = b.id; bId = b.id; }
        memos.push({ id: uid(), blockId: bId, date: j.date || todayKey(), text: (j.title ? j.title + "\n" : "") + (j.content || "") });
      });
    }
    if (out.tasks.length) {
      const tb = { id: uid(), name: "과제" };
      blocks.push(tb);
      out.tasks.forEach((t) => memos.push({ id: uid(), blockId: tb.id, date: todayKey(), text: (t.title || "") + (t.pos ? " — " + t.pos : "") + (t.memo ? "\n" + t.memo : "") + (t.done ? "\n(완료)" : "") }));
    }
    if (!blocks.length) ["느낀점", "현재구간", "다음목표"].forEach((n) => blocks.push({ id: uid(), name: n }));
    out.memoBlocks = blocks;
    out.memos = memos;
  } else if (!Array.isArray(out.memoBlocks)) {
    out.memoBlocks = [];
  }
  /* 긱 멤버 필드 정규화: id와 inst 필드 보장 */
  out.events = (out.events || []).map((e) => {
    if (!Array.isArray(e.members)) return e;
    return { ...e, members: e.members.map((m) => ({ id: m.id || uid(), inst: m.inst || "", name: m.name || "" })) };
  });
  return out;
}

/* 길게 눌러 드래그 정렬 — 드래그 중 블록이 손가락을 세로로 따라다녀요 */
function DragList({ items, idOf, onSort, render, useHandle }) {
  const wrapRefs = useRef({});
  const st = useRef(null);
  const supp = useRef(false);
  const itemsRef = useRef(items);
  itemsRef.current = items;
  const [dragId, setDragId] = useState(null);

  useEffect(() => {
    if (dragId === null) return;
    const stop = (e) => e.preventDefault();
    document.addEventListener("touchmove", stop, { passive: false });
    return () => document.removeEventListener("touchmove", stop);
  }, [dragId]);

  /* 드래그 중 블록을 포인터 아래에 붙여두는 세로 이동 (transform 직접 적용) */
  const follow = (s, pointerY) => {
    const el = wrapRefs.current[s.id];
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const naturalTop = rect.top - (s.appliedY || 0);
    const y = pointerY - s.grabDY - naturalTop;
    el.style.transform = `translateY(${y}px) scale(1.02)`;
    s.appliedY = y;
  };

  const finish = () => {
    const s = st.current;
    if (s) {
      clearTimeout(s.timer);
      if (s.active) {
        const el = wrapRefs.current[s.id];
        if (el) el.style.transform = "";
      }
      window.removeEventListener("pointermove", s.mv);
      window.removeEventListener("pointerup", s.up);
      window.removeEventListener("pointercancel", s.up);
    }
    st.current = null;
    setDragId(null);
  };

  const down = (e, id) => {
    if (st.current) return;
    if (!useHandle && e.target.closest("button, input, textarea, select, a")) return;
    if (e.pointerType === "mouse" && e.button !== 0) return;
    const s = { id, x0: e.clientX, y0: e.clientY, active: false, appliedY: 0, grabDY: 0, el: e.currentTarget, pid: e.pointerId };
    s.mv = (ev) => {
      if (!s.active) {
        if (Math.hypot(ev.clientX - s.x0, ev.clientY - s.y0) > 9) finish();
        return;
      }
      follow(s, ev.clientY);
      const list = itemsRef.current;
      const idx = list.findIndex((it) => idOf(it) === s.id);
      if (idx < 0) return;
      let to = idx;
      for (let j = 0; j < list.length; j++) {
        const el = wrapRefs.current[idOf(list[j])];
        if (!el || j === idx) continue;
        const r = el.getBoundingClientRect();
        const mid = r.top + r.height / 2;
        if (j < idx && ev.clientY < mid) to = Math.min(to, j);
        if (j > idx && ev.clientY > mid) to = Math.max(to, j);
      }
      if (to !== idx && onSort) {
        const next = list.slice();
        next.splice(to, 0, next.splice(idx, 1)[0]);
        onSort(next);
      }
    };
    s.up = () => {
      const wasActive = s.active;
      finish();
      if (wasActive) {
        supp.current = true;
        setTimeout(() => { supp.current = false; }, 400);
      }
    };
    s.timer = setTimeout(() => {
      s.active = true;
      const el = wrapRefs.current[id];
      if (el) s.grabDY = s.y0 - el.getBoundingClientRect().top;
      setDragId(id);
      try { s.el.setPointerCapture(s.pid); } catch (err) {}
      try { navigator.vibrate && navigator.vibrate(12); } catch (err) {}
    }, 380);
    st.current = s;
    window.addEventListener("pointermove", s.mv);
    window.addEventListener("pointerup", s.up);
    window.addEventListener("pointercancel", s.up);
  };

  const clickCap = (e) => { if (supp.current) { e.preventDefault(); e.stopPropagation(); supp.current = false; } };

  return (
    <>
      {items.map((it, i) => {
        const id = idOf(it);
        const dragging = dragId === id;
        const bind = { onPointerDown: (e) => down(e, id), onContextMenu: (e) => e.preventDefault() };
        return (
          <div key={id} ref={(el) => { wrapRefs.current[id] = el; }} className="dragwrap" onClickCapture={clickCap}
            {...(useHandle ? {} : bind)}
            style={{ position: "relative", zIndex: dragging ? 6 : "auto", transform: dragging ? "scale(1.02)" : "none", opacity: dragging ? 0.94 : 1, transition: dragging ? "none" : "transform .15s", borderRadius: 16, boxShadow: dragging ? "0 10px 28px rgba(0,0,0,0.5)" : "none", touchAction: dragId !== null ? "none" : "auto" }}>
            {render(it, i, dragging, useHandle ? bind : null)}
          </div>
        );
      })}
    </>
  );
}

function TodoWidget() {
  const { d, setD } = useApp();
  const [txt, setTxt] = useState("");
  const [showDone, setShowDone] = useState(false);
  const add = () => { const t = txt.trim(); if (!t) return; setD((s) => ({ ...s, todos: [{ id: uid(), text: t, done: false }, ...s.todos] })); setTxt(""); };
  const toggle = (id) => setD((s) => ({ ...s, todos: s.todos.map((t) => (t.id === id ? { ...t, done: !t.done } : t)) }));
  const del = (id) => setD((s) => ({ ...s, todos: s.todos.filter((t) => t.id !== id) }));
  const act = d.todos.filter((t) => !t.done);
  const done = d.todos.filter((t) => t.done);
  const row = (t) => (
    <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderTop: `1px solid ${C.line}` }}>
      <button className="ib" style={{ padding: 2 }} onClick={() => toggle(t.id)}>
        {t.done ? <CheckCircle2 size={20} color={C.teal} /> : <Circle size={20} color={C.line2} />}
      </button>
      <div style={{ flex: 1, fontSize: 14.5, fontWeight: 600, color: t.done ? C.faint : C.text, textDecoration: t.done ? "line-through" : "none" }}>{t.text}</div>
      <button className="ib" style={{ padding: 4 }} onClick={() => del(t.id)}><X size={15} color={C.faint} /></button>
    </div>
  );
  return (
    <>
      <SecLabel>TO-DO</SecLabel>
      <Card style={{ padding: "4px 15px 6px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 0" }}>
          <input className="inp" style={{ background: "transparent", border: "none", padding: "8px 2px", boxShadow: "none" }} placeholder="할 일 추가..." value={txt} onChange={(e) => setTxt(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          <button className="ib" onClick={add}><Plus size={20} color={C.gold} /></button>
        </div>
        {act.map(row)}
        {done.length > 0 && (
          <>
            <div style={{ borderTop: `1px solid ${C.line}` }}>
              <button onClick={() => setShowDone(!showDone)} style={{ background: "none", border: "none", color: C.faint, fontSize: 12.5, fontWeight: 800, padding: "11px 0" }}>완료 {done.length}개 {showDone ? "접기" : "보기"}</button>
            </div>
            {showDone && done.map(row)}
          </>
        )}
      </Card>
    </>
  );
}

  const dayEvs = (evByDate[sel] || []).slice().sort((a, b) => (a.time || "").localeCompare(b.time || ""));

function MonthGrid({ cur, evByDate, sel, setSel, types }) {
  const startDow = new Date(cur.y, cur.m, 1).getDay();
  const days = new Date(cur.y, cur.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let i = 1; i <= days; i++) cells.push(i);
  while (cells.length % 7 !== 0) cells.push(null);
  const tk = todayKey();
  const tById = {};
  types.forEach((t) => { tById[t.id] = t; });
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", marginBottom: 3 }}>
        {WK.map((w, i) => <div key={w} style={{ textAlign: "center", fontSize: 11.5, fontWeight: 800, color: i === 0 ? "#D98070" : i === 6 ? "#83A9E4" : C.faint, padding: "7px 0" }}>{w}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", rowGap: 2 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={i} style={{ height: 49 }} />;
          const key = `${cur.y}-${pad(cur.m + 1)}-${pad(day)}`;
          const evs = evByDate[key] || [];
          const isSel = sel === key;
          const isToday = tk === key;
          return (
            <button key={i} onClick={() => setSel(key)} style={{ height: 49, border: "none", background: "transparent", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, paddingTop: 4 }}>
              <div style={{ width: 30, height: 30, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13.5, fontWeight: isSel || isToday ? 800 : 600, background: isSel ? C.gold : "transparent", color: isSel ? "#17130A" : isToday ? C.gold : C.text, border: isToday && !isSel ? "1.5px solid rgba(233,190,88,0.55)" : "none", boxShadow: isSel ? "0 4px 14px rgba(233,190,88,0.28)" : "none" }}>{day}</div>
              <div style={{ display: "flex", gap: 2.5, height: 5, alignItems: "center" }}>
                {evs.slice(0, 3).map((e, j) => <div key={j} style={{ width: 5, height: 5, borderRadius: 1.5, background: (tById[e.typeId] && tById[e.typeId].color) || C.gray }} />)}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* 출석부: 날짜 × 회차 표 · 결석 시 캘린더 일정 삭제 + 회차 재조정 + 입금 재계산 */
function AttendanceView({ st }) {
  const { d, setD, show } = useApp();
  const [ask, setAsk] = useState(null);
  const lessonIds = d.settings.eventTypes.filter(isLessonType).map((t) => t.id);
  const lessons = d.events.filter((e) => e.studentId === st.id && lessonIds.includes(e.typeId)).slice().sort((a, b) => a.date.localeCompare(b.date));
  const cols = [
    ...lessons.map((e) => ({ key: "e" + e.id, date: e.date, evId: e.id })),
    ...(st.absents || []).map((a) => ({ key: "a" + a.id, date: a.date, absentId: a.id })),
  ].sort((a, b) => a.date.localeCompare(b.date));
  const att = st.att || {};
  const markOf = (c) => (c.absentId ? "X" : att[c.date] === "O" ? "O" : "");
  const markPresent = (c) => {
    setD((s) => ({ ...s, students: s.students.map((x) => (x.id === st.id ? { ...x, att: { ...(x.att || {}), [c.date]: "O" } } : x)) }));
    setAsk(null); show("출석 처리했어요");
  };
  const clearMark = (c) => {
    setD((s) => ({ ...s, students: s.students.map((x) => { if (x.id !== st.id) return x; const a2 = { ...(x.att || {}) }; delete a2[c.date]; return { ...x, att: a2 }; }) }));
    setAsk(null); show("기록을 지웠어요");
  };
  /* 결석 취소: 삭제했던 일정을 복구하고 회차 · 입금을 원래대로 재계산 */
  const removeAbsent = (c) => {
    const rec = (st.absents || []).find((a) => a.id === c.absentId);
    const canRestore = !!(rec && rec.ev);
    setD((s) => {
      let s2 = { ...s, students: s.students.map((x) => (x.id === st.id ? { ...x, absents: (x.absents || []).filter((a) => a.id !== c.absentId) } : x)) };
      if (rec && rec.ev && !s2.events.some((e) => e.id === rec.ev.id)) {
        s2 = { ...s2, events: [...s2.events, { ...rec.ev, paid: false, paidDate: "" }] };
        s2 = recalcGroupFees(s2, rec.ev.groupId);
      }
      return s2;
    });
    setAsk(null); show(canRestore ? "결석을 취소하고 일정을 복구했어요" : "결석 기록을 삭제했어요");
  };
  /* 결석: 일정 삭제(스냅샷 보관) → 남은 레슨을 다시 세어 입금 주기(매 1회차) 재적용 */
  const markAbsent = (c) => {
    setD((s) => {
      const ev = s.events.find((e) => e.id === c.evId);
      let s2 = s;
      if (ev) {
        s2 = { ...s2, events: s2.events.filter((e) => e.id !== ev.id), transactions: s2.transactions.filter((t) => t.eventId !== ev.id) };
        s2 = recalcGroupFees(s2, ev.groupId);
      }
      const students = s2.students.map((x) => (x.id === st.id ? { ...x, absents: [...(x.absents || []), { id: uid(), date: c.date, ev: ev || null }] } : x));
      return { ...s2, students };
    });
    setAsk(null); show("결석 처리 · 회차와 입금이 한 회 뒤로 밀렸어요");
  };
  return (
    <>
      <SecLabel>출석부</SecLabel>
      {cols.length ? (
        <>
          <Card style={{ padding: "13px 10px", overflowX: "auto" }}>
            <div style={{ minWidth: 46 + cols.length * 46 }}>
              <div style={{ display: "flex", marginBottom: 4 }}>
                <div style={{ width: 46, flexShrink: 0 }} />
                {cols.map((c) => {
                  const dt = parseKey(c.date);
                  return <div key={c.key} style={{ width: 46, flexShrink: 0, textAlign: "center", fontSize: 11, fontWeight: 800, color: c.date === todayKey() ? C.gold : C.faint }}>{dt.getMonth() + 1}/{dt.getDate()}</div>;
                })}
              </div>
              {cols.map((rc, i) => (
                <div key={rc.key} style={{ display: "flex", alignItems: "center", borderTop: `1px solid ${C.line}` }}>
                  <div style={{ width: 46, flexShrink: 0, fontSize: 11.5, fontWeight: 800, color: rc.absentId ? C.red : C.dim, padding: "9px 0" }}>{(() => { if (rc.absentId) return "결석"; const e0 = d.events.find((x) => x.id === rc.evId); const no = e0 ? lessonNoOf(d.events, e0) : null; return no ? `${no}회` : "-"; })()}</div>
                  {cols.map((c, j) => (
                    <div key={c.key} style={{ width: 46, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", padding: "5px 0" }}>
                      {j === i ? (
                        <button className="press" onClick={() => setAsk(c)} style={{ width: 32, height: 32, borderRadius: 10, border: `1.5px solid ${markOf(c) === "O" ? "rgba(76,201,166,0.5)" : markOf(c) === "X" ? "rgba(229,107,87,0.5)" : C.line2}`, background: markOf(c) === "O" ? C.tealBg : markOf(c) === "X" ? C.redBg : "transparent", color: markOf(c) === "O" ? C.teal : markOf(c) === "X" ? C.red : C.faint, fontSize: 13.5, fontWeight: 800 }}>{markOf(c) || "·"}</button>
                      ) : (
                        <span style={{ color: C.line2, fontSize: 12 }}>-</span>
                      )}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </Card>
          <div style={{ fontSize: 12, color: C.faint, padding: "8px 4px 0", lineHeight: 1.6 }}>셀을 누르면 출석(O)/결석(X)을 기록해요. 결석하면 그 날짜 레슨이 캘린더에서 삭제되고 이후 회차와 입금(매 1회차)이 한 회 뒤로 밀려요. 결석 셀을 다시 누르면 취소하고 일정을 복구할 수 있어요.</div>
        </>
      ) : (
        <Empty Icon={CalendarDays} title="예정된 레슨이 없어요" sub="캘린더에서 레슨 일정을 만들 때 학생을 연결하면 출석부가 자동으로 만들어져요" />
      )}
      {ask && (
        <div style={{ position: "fixed", inset: 0, zIndex: 80, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div onClick={() => setAsk(null)} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.62)", animation: "fade .15s ease" }} />
          <div style={{ position: "relative", width: "100%", maxWidth: 340, background: "#14120B", border: `1px solid ${C.line2}`, borderRadius: 20, padding: 18, animation: "up .2s cubic-bezier(.2,.9,.3,1)" }}>
            <div style={{ fontSize: 16, fontWeight: 800, marginBottom: 6 }}>{fmtKo(ask.date)} · {st.name}</div>
            {ask.absentId ? (
              <>
                <div style={{ fontSize: 12.5, color: C.dim, lineHeight: 1.6, marginBottom: 14 }}>{(() => { const rec = (st.absents || []).find((a) => a.id === ask.absentId); return rec && rec.ev ? "결석으로 기록된 날이에요. 결석을 취소하면 삭제됐던 일정이 복구되고 회차 · 입금이 원래대로 재계산돼요." : "결석으로 기록된 날이에요. 이 기록은 일정 정보가 없어 기록만 삭제돼요."; })()}</div>
                <Btn kind="d" style={{ width: "100%", marginBottom: 8 }} onClick={() => removeAbsent(ask)}>{(() => { const rec = (st.absents || []).find((a) => a.id === ask.absentId); return rec && rec.ev ? "결석 취소 (일정 복구)" : "결석 기록 삭제"; })()}</Btn>
              </>
            ) : (
              <>
                <div style={{ fontSize: 12.5, color: C.dim, lineHeight: 1.6, marginBottom: 14 }}>결석(X)을 선택하면 이 날짜 레슨이 캘린더에서 삭제되고, 이후 회차와 입금(매 1회차)이 한 회 뒤로 밀려요.</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <Btn style={{ flex: 1, background: C.tealBg, color: C.teal, border: "1px solid rgba(76,201,166,0.4)" }} onClick={() => markPresent(ask)}>출석 O</Btn>
                  <Btn kind="d" style={{ flex: 1 }} onClick={() => markAbsent(ask)}>결석 X</Btn>
                </div>
                {markOf(ask) === "O" && <Btn kind="g" style={{ width: "100%", marginBottom: 8 }} onClick={() => clearMark(ask)}>출석 기록 지우기</Btn>}
              </>
            )}
            <Btn kind="g" style={{ width: "100%" }} onClick={() => setAsk(null)}>닫기</Btn>
          </div>
        </div>
      )}
    </>
  );
}

function PracticeTab() {
  const { d } = useApp();

  const keys = ["routine", "memo"];

/* ───────────── 시트: 일정 ───────────── */
function EventSheet({ init }) {
  const { d, setD, close, show, rename } = useApp();
  const editing = init && init.id ? d.events.find((e) => e.id === init.id) : null;
  const perfDefaults = { callTime: "", showTime: "", ensemble: "", leader: "", members: [], teamNameOn: false, teamName: "", studentId: "" };
  const [f, setF] = useState(() => editing
    ? { ...perfDefaults, ...editing, fee: editing.fee ? fmtNum(editing.fee) : "" }
    : { title: "", typeId: (init && init.typeId) || d.settings.eventTypes[0].id, date: (init && init.date) || todayKey(), time: "", venue: (init && init.venue) || "", fee: "", memo: "", paid: false, repeat: "없음", ...perfDefaults });
  const u = (p) => setF((s) => ({ ...s, ...p }));
  const fee = parseNum(f.fee);
  const repeating = !editing && f.repeat && f.repeat !== "없음";
  const REPN = { "매주": 26, "2주마다": 13, "매월": 6 };
  const repN = repeating ? (REPN[f.repeat] || 8) : 1;
  const curType = d.settings.eventTypes.find((t) => t.id === f.typeId);
  const isLesson = isLessonType(curType);
  const isPerf = !!curType && !!curType.perf;
  const ensembles = d.settings.ensembles || [];
  const instList = d.settings.instruments || [];
  const setMember = (id, p) => setF((s) => ({ ...s, members: s.members.map((m) => (m.id === id ? { ...m, ...p } : m)) }));
  /* 정산 주기: 매주 레슨 = 4회(1·2·3·4 순환), 2주마다 = 2회(1·2 순환) — 입금은 매 1회차 */
  const needCycle = isLesson && repeating && (f.repeat === "매주" || f.repeat === "2주마다");
  const pc = needCycle ? { n: f.repeat === "매주" ? 4 : 2, at: "start" } : null;
  const groupCnt = editing && editing.groupId ? d.events.filter((e) => e.groupId === editing.groupId).length : 0;
  const futureCnt = editing && editing.groupId ? d.events.filter((e) => e.groupId === editing.groupId && e.date >= editing.date).length : 0;
  const [ask, setAsk] = useState(null);
  const doSave = (applyFuture) => {
    if (!f.date) return;
    const gid = repeating ? "g" + uid() : (editing ? editing.groupId : undefined);
    const evFee = needCycle ? (pc && payOnSeq(1, pc) ? fee : 0) : fee;
    const ev = {
      id: editing ? editing.id : uid(),
      title: (f.title || "").trim() || "제목 없는 일정",
      typeId: f.typeId, date: f.date, time: snap5(f.time || ""),
      venue: (f.venue || "").trim(), memo: (f.memo || "").trim(),
      fee: evFee, paid: evFee > 0 && !repeating ? !!f.paid : false,
      paidDate: evFee > 0 && !repeating && f.paid ? (editing && editing.paid && editing.paidDate ? editing.paidDate : todayKey()) : "",
      groupId: gid,
      callTime: snap5(f.callTime || ""), showTime: snap5(f.showTime || ""),
      ensemble: f.ensemble || "", leader: (f.leader || "").trim(),
      members: (f.members || []).map((m) => ({ id: m.id, inst: m.inst || "", name: (m.name || "").trim() })),
      teamNameOn: !!f.teamNameOn, teamName: (f.teamName || "").trim(),
      studentId: f.studentId || "",
      payCycle: editing ? editing.payCycle : (pc ? { n: pc.n, at: pc.at } : undefined),
      payAmount: editing
        ? (editing.payAmount !== undefined ? (fee > 0 ? fee : editing.payAmount) : undefined)
        : (needCycle && pc ? fee : undefined),
    };
    const extras = [];
    if (repeating) {
      for (let i = 1; i < repN; i++) {
        extras.push({ ...ev, id: uid(), date: repShift(ev.date, f.repeat, i), fee: needCycle ? (pc && payOnSeq(i + 1, pc) ? fee : 0) : fee });
      }
    }
    setD((s) => {
      let events;
      if (editing) {
        events = s.events.map((e) => {
          if (e.id === ev.id) return ev;
          if (applyFuture && gid && e.groupId === gid && e.date >= editing.date) {
            const nf = e.fee > 0 ? ev.fee : e.fee;
            return { ...e, title: ev.title, typeId: ev.typeId, time: ev.time, venue: ev.venue, memo: ev.memo, fee: nf, paid: nf > 0 ? e.paid : false, paidDate: nf > 0 ? e.paidDate : "", callTime: ev.callTime, showTime: ev.showTime, ensemble: ev.ensemble, leader: ev.leader, members: ev.members, teamNameOn: ev.teamNameOn, teamName: ev.teamName, studentId: ev.studentId };
          }
          return e;
        });
      } else {
        events = [...s.events, ev, ...extras];
      }
      let transactions = s.transactions.filter((t) => t.eventId !== ev.id);
      if (ev.paid && ev.fee > 0 && s.settings.autoLedger) {
        const type = s.settings.eventTypes.find((t) => t.id === ev.typeId);
        const kept = s.transactions.find((t) => t.eventId === ev.id);
        transactions = [...transactions, kept
          ? { ...kept, amount: ev.fee, memo: ev.title + (ev.venue ? " · " + ev.venue : "") }
          : { id: uid(), date: todayKey(), type: "수입", category: type ? (type.perf ? "연주" : type.name) : "기타수입", amount: ev.fee, memo: ev.title + (ev.venue ? " · " + ev.venue : ""), eventId: ev.id }];
      }
      if (applyFuture && editing && gid) {
        const byId = {};
        events.forEach((e) => { byId[e.id] = e; });
        transactions = transactions
          .map((t) => {
            const e = t.eventId ? byId[t.eventId] : null;
            if (e && e.groupId === gid && e.date >= editing.date && e.id !== ev.id) {
              return { ...t, amount: e.fee, memo: e.title + (e.venue ? " · " + e.venue : "") };
            }
            return t;
          })
          .filter((t) => {
            const e = t.eventId ? byId[t.eventId] : null;
            return !(e && e.groupId === gid && e.date >= editing.date && e.id !== ev.id && (!e.paid || e.fee <= 0));
          });
      }
      return { ...s, events, transactions };
    });
    close();
    show(repeating ? `${f.repeat} 반복 일정을 추가했어요` : editing ? (applyFuture ? "이후 반복 일정까지 수정했어요" : "일정을 수정했어요") : "일정을 추가했어요");
  };
  const delFuture = () => {
    const ids = d.events.filter((e) => e.groupId === editing.groupId && e.date >= editing.date).map((e) => e.id);
    setD((s) => ({ ...s, events: s.events.filter((e) => !ids.includes(e.id)), transactions: s.transactions.filter((t) => !ids.includes(t.eventId)) }));
    close(); show("이후 반복 일정까지 삭제했어요");
  };
  const delOne = () => {
    setD((s) => recalcGroupFees({ ...s, events: s.events.filter((e) => e.id !== editing.id), transactions: s.transactions.filter((t) => t.eventId !== editing.id) }, editing.groupId));
    close(); show(editing.groupId ? "일정을 삭제하고 회차 · 입금을 재조정했어요" : "일정을 삭제했어요");
  };
  return (
    <Sheet title={editing ? "일정 수정" : "새 일정"} footer={
      ask === "del" ? (
        <>
          <Btn kind="g" style={{ flex: 0.9, padding: "14px 6px", fontSize: 13.5 }} onClick={() => setAsk(null)}>취소</Btn>

          <Btn kind="d" style={{ flex: 1.4, padding: "14px 6px", fontSize: 13.5 }} onClick={delFuture}>이후 반복 모두</Btn>
        </>
      ) : ask === "save" ? (
        <>
          <Btn kind="g" style={{ flex: 0.9, padding: "14px 6px", fontSize: 13.5 }} onClick={() => setAsk(null)}>취소</Btn>
          <Btn style={{ flex: 1.1, padding: "14px 6px", fontSize: 13.5 }} onClick={() => doSave(false)}>이 일정만</Btn>
          <Btn style={{ flex: 1.4, padding: "14px 6px", fontSize: 13.5 }} onClick={() => doSave(true)}>이후 반복에 적용</Btn>
        </>
      ) : (
        <>
          {editing && (groupCnt > 1 ? <Btn kind="d" style={{ flex: 1 }} onClick={() => setAsk("del")}>삭제</Btn> : <ConfirmBtn onConfirm={delOne} />)}
          <Btn style={{ flex: 2 }} onClick={() => (editing && groupCnt > 1 ? setAsk("save") : doSave(false))}>저장</Btn>
        </>

      <Fld label="제목"><input className="inp" placeholder="예) 재즈 트리오, 지훈 레슨" value={f.title} onChange={(e) => u({ title: e.target.value })} /></Fld>
      <Fld label="유형">
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          {d.settings.eventTypes.map((t) => <Chip key={t.id} on={f.typeId === t.id} color={t.color} onClick={() => u({ typeId: t.id })}>{t.name}</Chip>)}
        </div>
      </Fld>
      {isLesson && d.students.length > 0 && (

          <select className="inp" value={f.studentId || ""} onChange={(e) => u({ studentId: e.target.value })}>

/* ───────────── 시트: 연주일정 추출 ───────────── */
function ExtractSheet() {
  const { d, close, show } = useApp();
  const [cur, setCur] = useState(nowYM);
  const [ids, setIds] = useState(() => d.settings.eventTypes.filter((t) => t.perf).map((t) => t.id));
  const toggleId = (id) => setIds((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));
  const mk = `${cur.y}-${pad(cur.m + 1)}`;
  const text = useMemo(() => {
    const evs = d.events.filter((e) => e.date.startsWith(mk) && ids.includes(e.typeId)).slice().sort(byDT);
    if (!evs.length) return "";
    /* 팀명: 직접입력 ON이면 그 이름, OFF면 리더+연주인원 영문명 (예: 리더QUINTET) */
    const teamOf = (e) => {
      if (e.teamNameOn && (e.teamName || "").trim()) return e.teamName.trim();
      const en0 = e.ensemble ? (d.settings.ensembles || []).find((x) => x.name === e.ensemble) : null;
      const enName = en0 ? (en0.en || ENBY[en0.size] || en0.name) : (e.ensemble || "");
      const leader = (e.leader || "").trim();
      return leader || enName ? `${leader}${enName}` : "";
    };
    let out = `🥁 ${cur.m + 1}월 연주 일정`;
    evs.forEach((e) => {
      const t0 = e.showTime || e.time;
      out += `\n\n${fmtKo(e.date)}${t0 ? " " + fmtK12(t0) : ""}`;
      if (e.venue) out += `\n@${e.venue}`;
      const team = teamOf(e);
      const mem = (e.members || []).map((m) => `${m.inst} ${m.name}`.trim()).join(", ");
      if (team && mem) out += `\n${team}: ${mem}`;
      else if (team) out += `\n${team}`;
      else if (mem) out += `\n${mem}`;
      else out += `\n${e.title}`;
    });
    return out;
  }, [d.events, d.settings.ensembles, mk, ids, cur.m]);
  const copy = async () => {
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
    } catch (err) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e2) {}
      document.body.removeChild(ta);
    }
    show("연주 일정을 복사했어요"); close();
  };
  return (
    <Sheet title="연주일정 텍스트 추출" footer={<><Btn kind="g" style={{ flex: 1 }} onClick={close}>닫기</Btn><Btn style={{ flex: 2 }} onClick={copy} disabled={!text}>텍스트 복사</Btn></>}>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}><MonthNav cur={cur} setCur={setCur} /></div>
      <Fld label="포함할 유형">
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          {d.settings.eventTypes.map((t) => <Chip key={t.id} on={ids.includes(t.id)} color={t.color} onClick={() => toggleId(t.id)}>{t.name}</Chip>)}
        </div>
      </Fld>
      <Lab>미리보기</Lab>
      <div style={{ background: C.card2, border: `1px solid ${C.line2}`, borderRadius: 13, padding: 15, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap", color: text ? C.text : C.faint, minHeight: 110 }}>
        {text || "이 달에는 선택한 유형의 일정이 없어요."}
      </div>
      <div style={{ fontSize: 12, color: C.faint, marginTop: 10, lineHeight: 1.5 }}>밴드 단톡방이나 SNS 공지에 바로 붙여넣기 좋게 만들어져요.</div>
    </Sheet>
  );
}

    setD((s) => ({ ...s, students: s.students.map((x) => (x.id === init.studentId ? { ...x, records: editing ? x.records.map((y) => (y.id === r.id ? r : y)) : [...x.records, r] } : x)) }));

/* ───────────── 시트: 루틴 블록 ───────────── */

  };
  const del = () => { setD((s) => ({ ...s, memos: (s.memos || []).filter((x) => x.id !== editing.id) })); close(); show("메모를 삭제했어요"); };
  return (

/* ───────────── 시트: 가계부 내역 ───────────── */
function TxnSheet({ init }) {

  const [f, setF] = useState(() => editing

  const u = (p) => setF((s) => ({ ...s, ...p }));

    setD((s) => ({ ...s, transactions: editing ? s.transactions.map((x) => (x.id === t.id ? t : x)) : [t, ...s.transactions] }));

            style={{ flex: 1, padding: "13px 0", borderRadius: 13, fontSize: 15, fontWeight: 800, border: `1px solid ${f.type === k ? (k === "수입" ? C.teal : C.red) : C.line2}`, background: f.type === k ? (k === "수입" ? C.tealBg : C.redBg) : "transparent", color: f.type === k ? (k === "수입" ? C.teal : C.red) : C.dim }}>{k}</button>
        ))}

      <Fld label="카테고리">

          {cats.map((c) => <Chip key={c} on={f.category === c} onClick={() => u({ category: c })}>{c}</Chip>)}

/* ───────────── 시트: 설정 · 커스터마이징 ───────────── */
function SettingsSheet() {
  const { d, setD, close, show, rename } = useApp();
  const s = d.settings;
  const setS = (p) => setD((x) => ({ ...x, settings: { ...x.settings, ...p } }));
  const [tab, setTab] = useState("프로필");
  const fileRef = useRef(null);
  const doExport = () => { exportBackup(d); show("백업 파일을 내보냈어요"); };
  const onImport = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result));
        if (!obj || typeof obj !== "object" || !obj.settings) throw new Error("형식 오류");
        setD(normalizeBackup(obj));
        show("백업을 불러와 전체 복원했어요");
      } catch (err) { show("백업 파일을 읽을 수 없어요"); }
    };
    reader.onerror = () => show("파일을 여는 데 실패했어요");
    reader.readAsText(file);
  };
  const delType = (id) => setD((x) => {
    if (x.settings.eventTypes.length <= 1) return x;
    const rest = x.settings.eventTypes.filter((t) => t.id !== id);
    const fb = rest[rest.length - 1].id;
    return { ...x, settings: { ...x.settings, eventTypes: rest }, events: x.events.map((e) => (e.typeId === id ? { ...e, typeId: fb } : e)) };
  });
  const cycleColor = (id) => setS({ eventTypes: s.eventTypes.map((t) => (t.id === id ? { ...t, color: PALETTE[(PALETTE.indexOf(t.color) + 1) % PALETTE.length] } : t)) });
  const widgetRows = [["stats", "이번 달 요약 카드"], ["values", "음악 가치관 리마인더"], ["unpaid", "미입금 알림"], ["today", "오늘 · 다가오는 일정"], ["todo", "To-do 리스트"]];
  const H = ({ children }) => <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: "0.12em", color: C.gold, margin: "26px 0 12px" }}>{children}</div>;
  const rowBox = { display: "flex", alignItems: "center", justifyContent: "space-between", background: C.card2, borderRadius: 13, padding: "12px 15px", marginBottom: 8, gap: 10 };
  const srow = { display: "flex", alignItems: "center", gap: 9, background: C.card2, borderRadius: 13, padding: "10px 9px 10px 13px", marginBottom: 8 };
  const sname = { flex: 1, minWidth: 0, fontSize: 14.5, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" };
  return (
    <Sheet title="설정 · 커스터마이징" full footer={<Btn style={{ flex: 1 }} onClick={close}>완료</Btn>}>
      <div style={{ position: "sticky", top: -12, zIndex: 3, background: "#14120B", margin: "-12px -20px 8px", padding: "12px 20px 10px", display: "flex", gap: 6, overflowX: "auto" }}>
        {["프로필", "연주", "레슨", "연습", "가계부", "데이터"].map((t) => <Chip key={t} on={tab === t} onClick={() => setTab(t)}>{t}</Chip>)}
      </div>

      {tab === "프로필" && (<>
        <H>프로필</H>
        <input className="inp" placeholder="이름 (홈 인사말에 쓰여요)" value={s.userName} onChange={(e) => setS({ userName: e.target.value })} />
        <H>음악 가치관</H>
        <Hint>홈 화면의 인용 카드로 보여요. 길게 눌러 수정 · 드래그로 정렬해요.</Hint>
        <DragList items={s.values} idOf={(v) => v.id}
          onSort={(arr) => setS({ values: arr })}
          render={(v) => (
            <div style={srow}>
              <div style={{ flex: 1, minWidth: 0, fontSize: 13.5, lineHeight: 1.5, fontFamily: SERIF, overflow: "hidden", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical" }}>{v.text}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "문장 수정", value: v.text, onSave: (n) => setD((x) => ({ ...x, settings: { ...x.settings, values: x.settings.values.map((y) => (y.id === v.id ? { ...y, text: n } : y)) } })) })}><Pencil size={14} color={C.faint} /></button>
              <button className="ib" style={{ padding: 6 }} onClick={() => setS({ values: s.values.filter((x) => x.id !== v.id) })}><Trash2 size={14} color={C.faint} /></button>
            </div>
          )} />
        <AddRow placeholder="새 문장 추가" onAdd={(n) => setS({ values: [...s.values, { id: uid(), text: n }] })} />
        <H>홈 화면 위젯</H>
        {widgetRows.map(([k, label]) => (
          <div key={k} style={rowBox}>
            <div style={{ fontSize: 14, fontWeight: 700 }}>{label}</div>
            <Toggle on={s.homeWidgets[k] !== false} onChange={(v) => setS({ homeWidgets: { ...s.homeWidgets, [k]: v } })} />
          </div>
        ))}
        <H>연동</H>
        <div style={rowBox}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700 }}>입금 완료 → 가계부 자동 기록</div>
            <div style={{ fontSize: 11.5, color: C.faint, marginTop: 3 }}>일정을 입금 처리하면 수입으로 자동 저장돼요</div>
          </div>
          <Toggle on={!!s.autoLedger} onChange={(v) => setS({ autoLedger: v })} />
        </div>
      </>)}

      {tab === "연주" && (<>
        <H>연주 유형</H>
        <Hint>색 점을 누르면 색이 바뀌고, '연주'를 켜면 연주 상세 입력 · 연주일정 추출 · 홈의 연주 횟수에 포함돼요. 길게 누르면 이름 수정, 길게 누른 채 드래그하면 순서가 바뀌어요.</Hint>
        <DragList items={s.eventTypes} idOf={(t) => t.id}
          onSort={(arr) => setS({ eventTypes: arr })}
          render={(t) => (
            <div style={srow}>
              <button onClick={() => cycleColor(t.id)} style={{ width: 22, height: 22, borderRadius: "50%", background: t.color, border: "2px solid rgba(255,255,255,0.15)", flexShrink: 0 }} />
              <div style={sname}>{t.name}</div>
              <button onClick={() => setS({ eventTypes: s.eventTypes.map((x) => (x.id === t.id ? { ...x, perf: !x.perf } : x)) })} style={{ fontSize: 11.5, fontWeight: 800, padding: "6px 11px", borderRadius: 100, border: `1px solid ${t.perf ? C.gold : C.line2}`, background: t.perf ? C.goldBg : "transparent", color: t.perf ? C.gold : C.faint, flexShrink: 0 }}>연주</button>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "유형 이름 수정", value: t.name, onSave: (n) => setD((x) => ({ ...x, settings: { ...x.settings, eventTypes: x.settings.eventTypes.map((y) => (y.id === t.id ? { ...y, name: n } : y)) } })) })}><Pencil size={14} color={C.faint} /></button>
              <button className="ib" style={{ padding: 6 }} onClick={() => delType(t.id)}><Trash2 size={14} color={C.faint} /></button>
            </div>
          )} />
        <AddRow placeholder="새 유형 이름" onAdd={(n) => setS({ eventTypes: [...s.eventTypes, { id: uid(), name: n, color: PALETTE[s.eventTypes.length % PALETTE.length], perf: false }] })} />

        <H>악기 목록</H>
        <Hint>연주 일정의 멤버 악기 드롭다운에 쓰여요. 길게 눌러 이름 수정 · 드래그로 정렬해요.</Hint>
        <DragList items={s.instruments || []} idOf={(x) => x}
          onSort={(arr) => setS({ instruments: arr })}
          render={(inst) => (
            <div style={srow}>
              <div style={sname}>{inst}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "악기 이름 수정", value: inst, onSave: (n) => setD((x) => (x.settings.instruments.includes(n) ? x : { ...x, settings: { ...x.settings, instruments: x.settings.instruments.map((i) => (i === inst ? n : i)) }, events: x.events.map((e) => (e.members && e.members.length ? { ...e, members: e.members.map((m) => (m.inst === inst ? { ...m, inst: n } : m)) } : e)) })) })}><Pencil size={14} color={C.faint} /></button>
              {(s.instruments || []).length > 1 && <button className="ib" style={{ padding: 6 }} onClick={() => setS({ instruments: s.instruments.filter((x) => x !== inst) })}><Trash2 size={14} color={C.faint} /></button>}
            </div>
          )} />
        <AddRow placeholder="새 악기 이름" onAdd={(n) => { if ((s.instruments || []).includes(n)) return false; setS({ instruments: [...(s.instruments || []), n] }); }} />

        <H>연주인원</H>
        <Hint>연주 일정의 인원 드롭다운과 팀 기본명에 쓰여요. 길게 눌러 이름을 바꿀 수 있어요.</Hint>
        <DragList items={s.ensembles || []} idOf={(en) => en.id}
          onSort={(arr) => setS({ ensembles: arr })}
          render={(en) => (
            <div style={srow}>
              <div style={sname}>{en.name} <span style={{ color: C.faint, fontSize: 12.5, fontWeight: 700 }}>{en.size}명</span></div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "이름 수정", value: en.name, onSave: (n) => setD((x) => ({ ...x, settings: { ...x.settings, ensembles: x.settings.ensembles.map((y) => (y.id === en.id ? { ...y, name: n } : y)) } })) })}><Pencil size={14} color={C.faint} /></button>
            </div>
          )} />
      </>)}

      {tab === "레슨" && (<>
        <H>학생 리스트</H>
        <Hint>드래그로 순서를 바꾸고, 길게 눌러 이름을 수정해요. 상세 정보 · 삭제는 레슨 탭에서 관리해요.</Hint>
        {d.students.length ? (
          <DragList items={d.students} idOf={(st) => st.id}
            onSort={(arr) => setD((x) => ({ ...x, students: arr }))}
            render={(st) => (
              <div style={srow}>
                <div style={sname}>{st.name} {st.info && <span style={{ color: C.faint, fontSize: 12.5, fontWeight: 700 }}>{st.info}</span>}</div>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.faint, flexShrink: 0 }}>{st.records.length}회</div>
                <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "학생 이름 수정", value: st.name, onSave: (n) => setD((x) => ({ ...x, students: x.students.map((y) => (y.id === st.id ? { ...y, name: n } : y)) })) })}><Pencil size={14} color={C.faint} /></button>
              </div>
            )} />
        ) : <Hint>아직 등록된 레슨생이 없어요.</Hint>}
        <AddRow placeholder="새 레슨생 이름" onAdd={(n) => setD((x) => ({ ...x, students: [...x.students, { id: uid(), name: n, info: "", contact: "", memo: "", records: [] }] }))} />

        <H>진도표 블록</H>
        <Hint>레슨 기록의 '진도'를 빠르게 선택할 수 있는 커리큘럼 블록이에요. 길게 눌러 이름 수정 · 드래그로 정렬해요.</Hint>
        <DragList items={s.curriculum || []} idOf={(c) => c.id}
          onSort={(arr) => setS({ curriculum: arr })}
          render={(c, i) => (
            <div style={srow}>
              <div style={{ fontSize: 11, fontWeight: 800, color: C.gold, width: 18, flexShrink: 0 }}>{i + 1}</div>
              <div style={sname}>{c.name}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "진도표 블록 수정", value: c.name, onSave: (n) => setD((x) => ({ ...x, settings: { ...x.settings, curriculum: x.settings.curriculum.map((y) => (y.id === c.id ? { ...y, name: n } : y)) } })) })}><Pencil size={14} color={C.faint} /></button>
              <button className="ib" style={{ padding: 6 }} onClick={() => setS({ curriculum: (s.curriculum || []).filter((x) => x.id !== c.id) })}><Trash2 size={14} color={C.faint} /></button>
            </div>
          )} />
        <AddRow placeholder="새 진도 블록 (예: 하프타임 셔플)" onAdd={(n) => setS({ curriculum: [...(s.curriculum || []), { id: uid(), name: n }] })} />
      </>)}

      {tab === "연습" && (<>
        <H>연습 탭 이름</H>
        <Hint>연습 탭의 메뉴 이름을 원하는 대로 바꿀 수 있어요. 비우면 기본 이름으로 돌아가요.</Hint>
        {[["routine", "루틴"], ["memo", "메모"]].map(([k, def]) => (
          <div key={k} style={{ display: "flex", alignItems: "center", gap: 10, background: C.card2, borderRadius: 13, padding: "3px 15px", marginBottom: 8 }}>
            <div style={{ fontSize: 11.5, color: C.faint, fontWeight: 800, width: 58, flexShrink: 0 }}>기본 {def}</div>
            <input className="inp" style={{ background: "transparent", border: "none", padding: "11px 0", boxShadow: "none", flex: 1, minWidth: 0 }} placeholder={def}
              value={s.pracNames && s.pracNames[k] !== undefined ? s.pracNames[k] : def}
              onChange={(e) => { const v = e.target.value.trim(); const newPN = { ...pracNamesOf(s), ...(s.pracNames || {}), [k]: v }; if (!v) delete newPN[k]; setS({ pracNames: newPN }); }} />
          </div>
        ))}

        <H>루틴 블록</H>
        <Hint>길게 눌러 이름 수정 · 드래그로 정렬해요. 색상은 연습 탭의 연필 버튼으로 수정해요.</Hint>
        <DragList items={d.routine} idOf={(b) => b.id}
          onSort={(arr) => setD((x) => ({ ...x, routine: arr }))}
          render={(b) => (
            <div style={srow}>
              <div style={{ width: 14, height: 14, borderRadius: 5, background: b.color, flexShrink: 0 }} />
              <div style={sname}>{b.label}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "블록 이름 수정", value: b.label, onSave: (n) => setD((x) => ({ ...x, routine: x.routine.map((y) => (y.id === b.id ? { ...y, label: n } : y)) })) })}><Pencil size={14} color={C.faint} /></button>
              <button className="ib" style={{ padding: 6 }} onClick={() => setD((x) => ({ ...x, routine: x.routine.filter((y) => y.id !== b.id) }))}><Trash2 size={14} color={C.faint} /></button>
            </div>
          )} />
        <AddRow placeholder="새 루틴 블록 이름" onAdd={(n) => setD((x) => ({ ...x, routine: [...x.routine, { id: uid(), label: n, color: PALETTE[x.routine.length % PALETTE.length] }] }))} />

        <H>메모 블록</H>
        <Hint>연습 탭 '메모'의 블록이에요. 길게 눌러 이름 수정 · 드래그로 정렬해요. 삭제하면 그 블록의 메모도 함께 지워져요.</Hint>
        <DragList items={d.memoBlocks || []} idOf={(b) => b.id}
          onSort={(arr) => setD((x) => ({ ...x, memoBlocks: arr }))}
          render={(b) => (
            <div style={srow}>
              <div style={sname}>{b.name} <span style={{ color: C.faint, fontSize: 12.5, fontWeight: 700 }}>{(d.memos || []).filter((m) => m.blockId === b.id).length}개</span></div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "블록 이름 수정", value: b.name, onSave: (n) => setD((x) => ({ ...x, memoBlocks: x.memoBlocks.map((y) => (y.id === b.id ? { ...y, name: n } : y)) })) })}><Pencil size={14} color={C.faint} /></button>
              <button className="ib" style={{ padding: 6 }} onClick={() => setD((x) => ({ ...x, memoBlocks: (x.memoBlocks || []).filter((y) => y.id !== b.id), memos: (x.memos || []).filter((m) => m.blockId !== b.id) }))}><Trash2 size={14} color={C.faint} /></button>
            </div>
          )} />
        <AddRow placeholder="새 메모 블록 (예: 느낀점)" onAdd={(n) => setD((x) => ({ ...x, memoBlocks: [...(x.memoBlocks || []), { id: uid(), name: n }] }))} />
      </>)}

      {tab === "가계부" && (<>
        <H>수입 카테고리</H>
        <Hint>길게 눌러 이름 수정 · 드래그로 정렬해요. 이름을 바꾸면 기존 내역에도 적용돼요.</Hint>
        <DragList items={s.incomeCats} idOf={(c) => c}
          onSort={(arr) => setS({ incomeCats: arr })}
          render={(c) => (
            <div style={srow}>
              <div style={sname}>{c}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "카테고리 이름 수정", value: c, onSave: (n) => setD((x) => (x.settings.incomeCats.includes(n) ? x : { ...x, settings: { ...x.settings, incomeCats: x.settings.incomeCats.map((y) => (y === c ? n : y)) }, transactions: x.transactions.map((t) => (t.type === "수입" && t.category === c ? { ...t, category: n } : t)) })) })}><Pencil size={14} color={C.faint} /></button>
              {s.incomeCats.length > 1 && <button className="ib" style={{ padding: 6 }} onClick={() => setS({ incomeCats: s.incomeCats.filter((x) => x !== c) })}><Trash2 size={14} color={C.faint} /></button>}
            </div>
          )} />
        <AddRow placeholder="수입 카테고리 추가" onAdd={(n) => { if (s.incomeCats.includes(n)) return false; setS({ incomeCats: [...s.incomeCats, n] }); }} />

        <H>지출 카테고리</H>
        <DragList items={s.expenseCats} idOf={(c) => c}
          onSort={(arr) => setS({ expenseCats: arr })}
          render={(c) => (
            <div style={srow}>
              <div style={sname}>{c}</div>
              <button className="ib" style={{ padding: 6 }} onClick={() => rename({ title: "카테고리 이름 수정", value: c, onSave: (n) => setD((x) => (x.settings.expenseCats.includes(n) ? x : { ...x, settings: { ...x.settings, expenseCats: x.settings.expenseCats.map((y) => (y === c ? n : y)) }, transactions: x.transactions.map((t) => (t.type === "지출" && t.category === c ? { ...t, category: n } : t)) })) })}><Pencil size={14} color={C.faint} /></button>
              {s.expenseCats.length > 1 && <button className="ib" style={{ padding: 6 }} onClick={() => setS({ expenseCats: s.expenseCats.filter((x) => x !== c) })}><Trash2 size={14} color={C.faint} /></button>}
            </div>
          )} />
        <AddRow placeholder="지출 카테고리 추가" onAdd={(n) => { if (s.expenseCats.includes(n)) return false; setS({ expenseCats: [...s.expenseCats, n] }); }} />
      </>)}

      {tab === "데이터" && (<>
        <H>백업 · 데이터</H>
        <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={onImport} />
        <Btn kind="g" style={{ width: "100%", marginBottom: 9, border: "1px solid rgba(233,190,88,0.45)", color: C.gold }} onClick={doExport}>백업 파일 내보내기 (.json)</Btn>
        <Btn kind="g" style={{ width: "100%", marginBottom: 9 }} onClick={() => fileRef.current && fileRef.current.click()}>백업 파일 불러오기</Btn>
        <div style={{ fontSize: 12, color: C.faint, margin: "2px 0 18px", lineHeight: 1.6 }}>백업은 항상 같은 이름(BACKSTAGE.json)으로 다운로드 폴더에 저장돼요 — 파일 앱에서 iCloud Drive로 옮겨두면 안전해요. 불러오기를 하면 현재 데이터가 백업 파일 내용으로 교체돼요. 이전 버전 백업도 자동으로 보정돼 그대로 쓸 수 있어요.</div>
      </>)}
    </Sheet>
  );
}

/* ───────────── 시트 라우터 · 헤더 · 내비 ───────────── */
function SheetRouter({ sheet }) {
  const init = sheet.init;
  switch (sheet.k) {
    case "event": return <EventSheet init={init} />;
    case "extract": return <ExtractSheet />;
    case "venue": return <VenueSheet init={init} />;
    case "student": return <StudentSheet init={init} />;
    case "record": return <RecordSheet init={init} />;
    case "block": return <BlockSheet init={init} />;
    case "memo": return <MemoSheet init={init} />;
    case "txn": return <TxnSheet init={init} />;
    case "settings": return <SettingsSheet />;
    default: return null;
  }
}

function Header() {
  const { open, saveState } = useApp();
  return (
    <header style={{ position: "sticky", top: 0, zIndex: 30, backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", background: "rgba(12,11,8,0.85)", borderBottom: `1px solid ${C.line}`, paddingTop: "max(env(safe-area-inset-top), 8px)" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "13px 18px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <div style={{ width: 27, height: 27, borderRadius: 9, background: "linear-gradient(150deg, #F0CA6B, #C9962F)", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 2px 10px rgba(233,190,88,0.25)" }}>
            <Music4 size={15} color="#17130A" strokeWidth={2.6} />
          </div>
          <div style={{ fontFamily: DISP, fontSize: 16.5, letterSpacing: "0.3em", color: C.gold, lineHeight: 1, paddingTop: 3 }}>BACKSTAGE</div>
        </div>
        {saveState === "error" && (
          <button onClick={() => open({ k: "settings" })} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", padding: "6px 4px" }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.red, flexShrink: 0 }} />
            <span style={{ fontSize: 10.5, fontWeight: 800, color: C.red, whiteSpace: "nowrap" }}>저장 실패—백업 필요</span>
          </button>
        )}
      </div>
    </header>
  );
}

const NAV = [
  { k: "home", l: "홈", I: Home },
  { k: "cal", l: "일정", I: CalendarDays },
  { k: "lesson", l: "레슨", I: GraduationCap },
  { k: "prac", l: "연습", I: Music4 },
  { k: "money", l: "머니", I: Wallet },
];

function Nav({ tab, setTab }) {
  const { open } = useApp();
  return (
    <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 520, zIndex: 35, background: "rgba(13,12,9,0.92)", backdropFilter: "blur(18px)", WebkitBackdropFilter: "blur(18px)", borderTop: `1px solid ${C.line}`, display: "flex", padding: "7px 6px calc(9px + env(safe-area-inset-bottom))" }}>
      {NAV.map(({ k, l, I }) => {
        const on = tab === k;
        return (
          <button key={k} onClick={() => setTab(k)} style={{ position: "relative", flex: 1, background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "6px 0" }}>
            <div style={{ position: "absolute", top: -8, left: "50%", transform: "translateX(-50%)", width: 20, height: 3, borderRadius: "0 0 3px 3px", background: on ? C.gold : "transparent", boxShadow: on ? "0 3px 12px rgba(233,190,88,0.55)" : "none", transition: "background .2s" }} />
            <I size={21} color={on ? C.gold : C.faint} strokeWidth={on ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: 800, color: on ? C.gold : C.faint }}>{l}</span>
          </button>
        );
      })}
      <button onClick={() => open({ k: "settings" })} style={{ flex: 1, background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "6px 0" }}>
        <Settings size={21} color={C.faint} strokeWidth={2} />
        <span style={{ fontSize: 10.5, fontWeight: 800, color: C.faint }}>설정</span>
      </button>
    </nav>
  );
}

function Loading() {
  return (
    <div style={{ minHeight: "100dvh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, fontFamily: FONT }}>
      <style>{CSS}</style>
      <div style={{ width: 46, height: 46, borderRadius: 15, background: "linear-gradient(150deg, #F0CA6B, #C9962F)", display: "flex", alignItems: "center", justifyContent: "center", animation: "pulse 1.4s infinite", boxShadow: "0 6px 24px rgba(233,190,88,0.3)" }}>
        <Music4 size={24} color="#17130A" strokeWidth={2.5} />
      </div>
      <div style={{ fontFamily: DISP, fontSize: 15, letterSpacing: "0.32em", color: C.gold, paddingLeft: "0.32em" }}>BACKSTAGE</div>
    </div>
  );
}

/* ───────────── 앱 루트 ───────────── */
function App() {
  const [d, setD] = useState(null);
  const [tab, setTab] = useState("home");
  const [sheet, setSheet] = useState(null);
  const [ren, setRen] = useState(null);
  const [toast, setToast] = useState(null);
  const [saveState, setSaveState] = useState("saving");
  const saveT = useRef(null);
  const toastT = useRef(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      let loaded = null;
      try {
        const raw = await store.get(KEY);
        if (raw) loaded = JSON.parse(raw);
      } catch (err) { /* 첫 실행 */ }
      if (alive) setD(loaded ? normalizeBackup(loaded) : seedData());
    })();
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    if (!d) return;
    setSaveState("saving");
    clearTimeout(saveT.current);
    saveT.current = setTimeout(async () => {
      let ok = false;
      try { ok = await store.set(KEY, JSON.stringify(d)); } catch (err) { ok = false; }
      setSaveState(ok ? "saved" : "error");
    }, 700);
    return () => clearTimeout(saveT.current);
  }, [d]);

  const show = (m) => { setToast(m); clearTimeout(toastT.current); toastT.current = setTimeout(() => setToast(null), 1800); };

  const togglePaid = (evId, paid) => setD((s) => {
    const ev0 = s.events.find((e) => e.id === evId);
    if (!ev0) return s;
    const events = s.events.map((e) => (e.id === evId ? { ...e, paid, paidDate: paid ? todayKey() : "" } : e));
    let transactions = s.transactions.filter((t) => t.eventId !== evId);
    if (paid && s.settings.autoLedger && ev0.fee > 0) {
      const type = s.settings.eventTypes.find((t) => t.id === ev0.typeId);
      transactions = [...transactions, { id: uid(), date: todayKey(), type: "수입", category: type ? (type.perf ? "연주" : type.name) : "기타수입", amount: ev0.fee, memo: ev0.title + (ev0.venue ? " · " + ev0.venue : ""), eventId: ev0.id }];
    }
    return { ...s, events, transactions };
  });

  if (!d) return <Loading />;

  const ctx = { d, setD, open: setSheet, close: () => setSheet(null), show, setTab, togglePaid, saveState, rename: setRen };

  return (
    <Ctx.Provider value={ctx}>
      <div style={{ minHeight: "100dvh", background: C.bg, color: C.text, fontFamily: FONT, letterSpacing: "-0.01em" }}>
        <style>{CSS}</style>
        <div style={{ maxWidth: 520, margin: "0 auto", minHeight: "100dvh", position: "relative" }}>
          <div style={{ position: "absolute", top: -130, left: "50%", transform: "translateX(-50%)", width: 460, height: 340, background: "radial-gradient(closest-side, rgba(233,190,88,0.11), transparent)", pointerEvents: "none" }} />
          <Header />
          <main style={{ padding: "0 18px 118px", position: "relative" }}>
            {tab === "home" && <HomeTab />}
            {tab === "cal" && <ScheduleTab />}
            {tab === "lesson" && <LessonsTab />}
            {tab === "prac" && <PracticeTab />}
            {tab === "money" && <MoneyTab />}
          </main>
          <Nav tab={tab} setTab={setTab} />
          {sheet && <SheetRouter sheet={sheet} />}
          {ren && <NameDialog req={ren} close={() => setRen(null)} />}
          {toast && <Toast msg={toast} />}
        </div>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
