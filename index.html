/* 저장 어댑터: 아티팩트(window.storage) → 브라우저(localStorage) → 메모리 순으로 자동 선택 */
const store = {
  mem: {},
  async get(k) {
    try { if (window.storage && window.storage.get) { const r = await window.storage.get(k); if (r && r.value !== undefined) return r.value; } } catch (e) {}
    try { const v = localStorage.getItem(k); if (v !== null) return v; } catch (e) {}
    return this.mem[k] !== undefined ? this.mem[k] : null;
  },
  async set(k, v) {
    try { if (window.storage && window.storage.set) { const r = await window.storage.set(k, v); if (r) return true; } } catch (e) {}
    try { localStorage.setItem(k, v); if (localStorage.getItem(k) === v) return true; } catch (e) {}
    this.mem[k] = v;
    return false;
  },
};

/* 백업 파일 내보내기: BACKSTAGE-YYYY-MM-DD.json 다운로드 */
const exportBackup = (data) => {
  const t = new Date();
  const p2 = (n) => String(n).padStart(2, "0");
  const name = `BACKSTAGE-${t.getFullYear()}-${p2(t.getMonth() + 1)}-${p2(t.getDate())}.json`;
  try {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 900);
  } catch (e) {}
  return name;
};

  const base = emptyData();
  const out = { ...base, ...obj };
  out.settings = { ...base.settings, ...(obj && obj.settings ? obj.settings : {}) };
  ["values", "eventTypes", "incomeCats", "expenseCats"].forEach((k) => {
    if (!Array.isArray(out.settings[k]) || !out.settings[k].length) out.settings[k] = base.settings[k];
  });
  if (!out.settings.homeWidgets || typeof out.settings.homeWidgets !== "object") out.settings.homeWidgets = base.settings.homeWidgets;
  ["events", "todos", "students", "tasks", "routine", "scores", "venues", "transactions", "journal"].forEach((k) => {
    if (!Array.isArray(out[k])) out[k] = [];

  return out;
}

function HomeTab() {
  const { d, setTab } = useApp();
  const w = d.settings.homeWidgets || {};
  const on = (k) => w[k] !== false;
  const tk = todayKey();
  const now = new Date();
  const hour = now.getHours();
  const greet = hour < 5 ? "늦은 밤의 리듬 속에서" : hour < 11 ? "좋은 아침이에요" : hour < 17 ? "오늘도 그루브하게" : hour < 22 ? "무대 뒤, 준비됐나요" : "오늘 하루도 수고했어요";
  const name = (d.settings.userName || "").trim();
  const dateStr = `${now.getMonth() + 1}월 ${now.getDate()}일 ${WK[now.getDay()]}요일`;
  const [qi, setQi] = useState(() => Math.floor(Math.random() * 100));
  const vals = d.settings.values;
  const quote = vals.length ? vals[qi % vals.length] : null;
  const todayEvs = d.events.filter((e) => e.date === tk).slice().sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  const upcoming = d.events.filter((e) => e.date > tk).slice().sort(byDT).slice(0, 3);
  const ym = tk.slice(0, 7);
  const perfIds = d.settings.eventTypes.filter((t) => t.perf).map((t) => t.id);
  const perfCount = d.events.filter((e) => e.date.startsWith(ym) && perfIds.includes(e.typeId)).length;
  const income = d.transactions.filter((t) => t.type === "수입" && t.date.startsWith(ym)).reduce((s, t) => s + t.amount, 0);
  const unpaid = d.events.filter((e) => e.fee > 0 && !e.paid && e.date <= tk);
  const unpaidSum = unpaid.reduce((s, e) => s + e.fee, 0);
  return (
    <>
      <div style={{ margin: "24px 2px 0" }}>
        <div style={{ fontSize: 12.5, color: C.faint, fontWeight: 700, marginBottom: 7 }}>{dateStr}</div>
        <div style={{ fontSize: 23, fontWeight: 800, lineHeight: 1.32, letterSpacing: "-0.02em" }}>{name ? `${name}님, ` : ""}{greet}</div>
      </div>
      {on("stats") && (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 9, marginTop: 20 }}>
          <StatCard label="이번 달 연주" val={`${perfCount}회`} onClick={() => setTab("cal")} />
          <StatCard label="이번 달 입금" val={wonShort(income)} tint={C.teal} onClick={() => setTab("money")} />
          <StatCard label="미입금" val={wonShort(unpaidSum)} tint={unpaidSum > 0 ? C.red : C.faint} onClick={() => setTab("money")} />
        </div>
      )}
      {on("values") && quote && (
        <div className="press" onClick={() => setQi((i) => i + 1)} style={{ marginTop: 14, position: "relative", overflow: "hidden", borderRadius: 20, border: "1px solid rgba(231,187,84,0.28)", background: "linear-gradient(140deg, rgba(231,187,84,0.15), rgba(231,187,84,0.03) 55%, rgba(0,0,0,0))", padding: "19px 20px 16px" }}>
          <Quote size={16} color={C.gold} style={{ marginBottom: 9, opacity: 0.9 }} />
          <div style={{ fontFamily: SERIF, fontSize: 17, lineHeight: 1.55, fontWeight: 500, color: "#F7F0DE" }}>{quote.text}</div>
          <div style={{ marginTop: 11, fontSize: 10.5, color: C.faint, fontWeight: 800, letterSpacing: "0.08em" }}>나의 음악 가치관 · 탭해서 다음 문장</div>
        </div>
      )}
      {on("unpaid") && unpaid.length > 0 && (
        <div className="press" onClick={() => setTab("money")} style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 11, background: C.redBg, border: "1px solid rgba(229,107,87,0.3)", borderRadius: 16, padding: "13px 15px" }}>
          <AlertCircle size={18} color={C.red} style={{ flexShrink: 0 }} />
          <div style={{ flex: 1, fontSize: 13.5, fontWeight: 700, color: "#F2C2B8" }}>입금 확인이 필요해요 · {unpaid.length}건 · {won(unpaidSum)}</div>
          <ChevronRight size={16} color={C.red} />
        </div>
      )}
      {on("today") && (
        <>
          <SecLabel right={<button onClick={() => setTab("cal")} style={{ background: "none", border: "none", color: C.faint, fontSize: 12, fontWeight: 800, padding: 4 }}>캘린더 →</button>}>오늘의 일정</SecLabel>
          {todayEvs.length ? todayEvs.map((e) => <EventCard key={e.id} ev={e} />) : (
            <Card style={{ color: C.dim, fontSize: 13.5, lineHeight: 1.5 }}>오늘은 일정이 없어요. 연습하기 좋은 날이에요 🥁</Card>
          )}
          {upcoming.length > 0 && (
            <>
              <SecLabel>다가오는 일정</SecLabel>
              {upcoming.map((e) => <EventCard key={e.id} ev={e} showDate />)}
            </>
          )}
        </>
      )}
      {on("todo") && <TodoWidget />}
    </>
  );
}

function TodoWidget() {
  const { d, setD } = useApp();
  const [txt, setTxt] = useState("");
  const [showDone, setShowDone] = useState(false);
  const add = () => { const t = txt.trim(); if (!t) return; setD((s) => ({ ...s, todos: [{ id: uid(), text: t, done: false }, ...s.todos] })); setTxt(""); };
  const toggle = (id) => setD((s) => ({ ...s, todos: s.todos.map((t) => (t.id === id ? { ...t, done: !t.done } : t)) }));
  const del = (id) => setD((s) => ({ ...s, todos: s.todos.filter((t) => t.id !== id) }));
  const act = d.todos.filter((t) => !t.done);
  const done = d.todos.filter((t) => t.done);
  const row = (t) => (
    <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderTop: `1px solid ${C.line}` }}>
      <button className="ib" style={{ padding: 2 }} onClick={() => toggle(t.id)}>
        {t.done ? <CheckCircle2 size={20} color={C.teal} /> : <Circle size={20} color={C.line2} />}
      </button>
      <div style={{ flex: 1, fontSize: 14.5, fontWeight: 600, color: t.done ? C.faint : C.text, textDecoration: t.done ? "line-through" : "none" }}>{t.text}</div>
      <button className="ib" style={{ padding: 4 }} onClick={() => del(t.id)}><X size={15} color={C.faint} /></button>
    </div>
  );
  return (
    <>
      <SecLabel>TO-DO</SecLabel>
      <Card style={{ padding: "4px 15px 6px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "8px 0" }}>
          <input className="inp" style={{ background: "transparent", border: "none", padding: "8px 2px", boxShadow: "none" }} placeholder="할 일 추가..." value={txt} onChange={(e) => setTxt(e.target.value)} onKeyDown={(e) => e.key === "Enter" && add()} />
          <button className="ib" onClick={add}><Plus size={20} color={C.gold} /></button>
        </div>
        {act.map(row)}
        {done.length > 0 && (
          <>
            <div style={{ borderTop: `1px solid ${C.line}` }}>
              <button onClick={() => setShowDone(!showDone)} style={{ background: "none", border: "none", color: C.faint, fontSize: 12.5, fontWeight: 800, padding: "11px 0" }}>완료 {done.length}개 {showDone ? "접기" : "보기"}</button>
            </div>
            {showDone && done.map(row)}
          </>
        )}
      </Card>
    </>
  );
}

        </>

              </div>
              {upcoming.filter((e) => e.date === dk).map((e) => <EventCard key={e.id} ev={e} />)}
            </div>
          )) : <Empty Icon={CalendarDays} title="다가오는 일정이 없어요" sub="+ 버튼으로 첫 일정을 추가해 보세요" />}
        </div>

}

function MonthGrid({ cur, evByDate, sel, setSel, types }) {
  const startDow = new Date(cur.y, cur.m, 1).getDay();
  const days = new Date(cur.y, cur.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let i = 1; i <= days; i++) cells.push(i);
  while (cells.length % 7 !== 0) cells.push(null);
  const tk = todayKey();
  const tById = {};
  types.forEach((t) => { tById[t.id] = t; });
  return (
    <div style={{ marginTop: 8 }}>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", marginBottom: 3 }}>
        {WK.map((w, i) => <div key={w} style={{ textAlign: "center", fontSize: 11.5, fontWeight: 800, color: i === 0 ? "#D98070" : i === 6 ? "#83A9E4" : C.faint, padding: "7px 0" }}>{w}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", rowGap: 2 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={i} style={{ height: 49 }} />;
          const key = `${cur.y}-${pad(cur.m + 1)}-${pad(day)}`;
          const evs = evByDate[key] || [];
          const isSel = sel === key;
          const isToday = tk === key;
          return (
            <button key={i} onClick={() => setSel(key)} style={{ height: 49, border: "none", background: "transparent", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, paddingTop: 4 }}>
              <div style={{ width: 29, height: 29, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13.5, fontWeight: isSel || isToday ? 800 : 600, background: isSel ? C.gold : "transparent", color: isSel ? "#17130A" : isToday ? C.gold : C.text, border: isToday && !isSel ? "1.5px solid rgba(231,187,84,0.55)" : "none" }}>{day}</div>
              <div style={{ display: "flex", gap: 3, height: 5, alignItems: "center" }}>
                {evs.slice(0, 3).map((e, j) => <div key={j} style={{ width: 4.5, height: 4.5, borderRadius: "50%", background: (tById[e.typeId] && tById[e.typeId].color) || C.gray }} />)}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

function RoutineView() {
  const { d, setD, open } = useApp();
  const tk = todayKey();
  const checks = d.routineChecks[tk] || [];
  const total = d.routine.reduce((s, b) => s + (b.min || 0), 0);
  const toggle = (id) => setD((s) => {
    const cur = s.routineChecks[tk] || [];
    const next = cur.includes(id) ? cur.filter((x) => x !== id) : [...cur, id];
    return { ...s, routineChecks: { ...s.routineChecks, [tk]: next } };
  });
  const move = (i, dir) => setD((s) => {
    const arr = s.routine.slice();
    const j = i + dir;
    if (j < 0 || j >= arr.length) return s;
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    return { ...s, routine: arr };
  });
  const last7 = Array.from({ length: 7 }, (_, i) => keyOf(new Date(Date.now() - (6 - i) * 86400000)));
  return (
    <>
      <div style={{ marginTop: 16 }}>
        {d.routine.length ? (
          <Card>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 13 }}>
              <div style={{ fontSize: 15.5, fontWeight: 800 }}>오늘의 루틴</div>
              <div style={{ fontSize: 13, fontWeight: 800, color: checks.length === d.routine.length ? C.teal : C.gold }}>{checks.length}/{d.routine.length} · 총 {total}분</div>
            </div>
            <div style={{ display: "flex", height: 16, gap: 2 }}>
              {d.routine.map((b) => <div key={b.id} style={{ flex: Math.max(b.min || 1, 1), background: b.color, opacity: checks.includes(b.id) ? 1 : 0.3, transition: "opacity .2s", borderRadius: 4 }} />)}
            </div>
            <div style={{ marginTop: 6 }}>
              {d.routine.map((b, i) => (
                <div key={b.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "11px 0", borderBottom: i < d.routine.length - 1 ? `1px solid ${C.line}` : "none" }}>
                  <button className="ib" style={{ padding: 2 }} onClick={() => toggle(b.id)}>
                    {checks.includes(b.id) ? <CheckCircle2 size={21} color={b.color} /> : <Circle size={21} color={C.line2} />}
                  </button>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14.5, fontWeight: 700, color: checks.includes(b.id) ? C.dim : C.text, textDecoration: checks.includes(b.id) ? "line-through" : "none", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{b.label}</div>
                    <div style={{ fontSize: 11.5, color: C.faint, fontWeight: 700, marginTop: 2 }}>{b.min}분</div>
                  </div>
                  <button className="ib" style={{ padding: 4 }} onClick={() => move(i, -1)}><ArrowUp size={14} color={C.faint} /></button>
                  <button className="ib" style={{ padding: 4 }} onClick={() => move(i, 1)}><ArrowDown size={14} color={C.faint} /></button>
                  <button className="ib" style={{ padding: 4 }} onClick={() => open({ k: "block", init: { id: b.id } })}><Pencil size={14} color={C.faint} /></button>
                </div>
              ))}
            </div>
          </Card>
        ) : <Empty Icon={Music4} title="루틴이 비어 있어요" sub="+ 버튼으로 연습 블록을 추가하면 비율 그래프로 보여드려요" />}
        {d.routine.length > 0 && (
          <>
            <SecLabel>최근 7일</SecLabel>
            <Card style={{ display: "flex", justifyContent: "space-between", padding: "14px 18px" }}>
              {last7.map((dk) => {
                const c = (d.routineChecks[dk] || []).length;
                const r = d.routine.length ? c / d.routine.length : 0;
                const dt = parseKey(dk);
                return (
                  <div key={dk} style={{ textAlign: "center" }}>
                    <div style={{ width: 27, height: 27, borderRadius: "50%", margin: "0 auto", background: r > 0 ? C.gold : C.card2, opacity: r > 0 ? 0.3 + r * 0.7 : 1, border: dk === tk ? `2px solid ${C.gold}` : `1px solid ${C.line}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: r > 0.99 ? "#17130A" : C.faint }}>{r > 0.99 ? "✓" : ""}</div>
                    <div style={{ fontSize: 10.5, color: dk === tk ? C.gold : C.faint, fontWeight: 800, marginTop: 5 }}>{WK[dt.getDay()]}</div>
                  </div>
                );
              })}
            </Card>
          </>
        )}
      </div>
      <FAB onClick={() => open({ k: "block" })} />
    </>
  );
}

function LedgerView() {
  const { d, open } = useApp();
  const [cur, setCur] = useState(nowYM);
  const mk = `${cur.y}-${pad(cur.m + 1)}`;
  const txs = d.transactions.filter((t) => t.date.startsWith(mk)).slice().sort((a, b) => b.date.localeCompare(a.date));
  const inc = txs.filter((t) => t.type === "수입").reduce((s, t) => s + t.amount, 0);
  const exp = txs.filter((t) => t.type === "지출").reduce((s, t) => s + t.amount, 0);
  const net = inc - exp;
  const dates = [...new Set(txs.map((t) => t.date))];
  const cats = {};
  txs.filter((t) => t.type === "지출").forEach((t) => { cats[t.category] = (cats[t.category] || 0) + t.amount; });
  const catList = Object.entries(cats).sort((a, b) => b[1] - a[1]);
  const maxCat = catList.length ? catList[0][1] : 1;
  return (
    <>
      <div style={{ display: "flex", justifyContent: "center", marginTop: 14 }}><MonthNav cur={cur} setCur={setCur} /></div>
      <Card style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6, marginTop: 8, padding: "15px 12px", textAlign: "center" }}>
        <div><div style={sumLab}>수입</div><div style={sumVal(C.teal)}>{wonShort(inc)}</div></div>
        <div style={{ borderLeft: `1px solid ${C.line}`, borderRight: `1px solid ${C.line}` }}><div style={sumLab}>지출</div><div style={sumVal(C.red)}>{wonShort(exp)}</div></div>
        <div><div style={sumLab}>합계</div><div style={sumVal(net >= 0 ? C.text : C.red)}>{net < 0 ? "-" : ""}{wonShort(Math.abs(net))}</div></div>
      </Card>
      {catList.length > 0 && (
        <>
          <SecLabel>지출 분석</SecLabel>
          <Card>
            {catList.slice(0, 5).map(([c, v], i) => (
              <div key={c} style={{ marginBottom: i < Math.min(catList.length, 5) - 1 ? 12 : 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12.5, fontWeight: 700, marginBottom: 5 }}>
                  <span style={{ color: C.dim }}>{c}</span><span style={{ fontVariantNumeric: "tabular-nums" }}>{won(v)}</span>
                </div>
                <Bar v={(v / maxCat) * 100} color={C.red} h={6} />
              </div>
            ))}
          </Card>
        </>
      )}
      <SecLabel>내역</SecLabel>
      {dates.length ? dates.map((dk) => (
        <div key={dk}>
          <div style={{ fontSize: 12, fontWeight: 800, color: C.faint, margin: "12px 2px 7px" }}>{fmtKo(dk)}</div>
          {txs.filter((t) => t.date === dk).map((t) => (
            <Card key={t.id} onClick={() => open({ k: "txn", init: { id: t.id } })} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8, padding: "12px 15px" }}>
              <div style={{ width: 36, height: 36, borderRadius: 12, background: t.type === "수입" ? C.tealBg : C.redBg, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                {t.type === "수입" ? <TrendingUp size={16} color={C.teal} /> : <TrendingDown size={16} color={C.red} />}
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14.5, fontWeight: 700 }}>{t.category}</div>
                {t.memo && <div style={{ fontSize: 12, color: C.faint, marginTop: 2, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{t.memo}</div>}
              </div>
              <div style={{ fontSize: 14.5, fontWeight: 800, color: t.type === "수입" ? C.teal : C.text, fontVariantNumeric: "tabular-nums", flexShrink: 0 }}>{t.type === "수입" ? "+" : "-"}{won(t.amount)}</div>
            </Card>

/* ───────────── 시트: 일정 ───────────── */
function EventSheet({ init }) {
  const { d, setD, close, show } = useApp();
  const editing = init && init.id ? d.events.find((e) => e.id === init.id) : null;
  const [f, setF] = useState(() => editing
    ? { ...editing, fee: editing.fee ? fmtNum(editing.fee) : "" }
    : { title: "", typeId: (init && init.typeId) || d.settings.eventTypes[0].id, date: (init && init.date) || todayKey(), time: "", venue: (init && init.venue) || "", fee: "", memo: "", paid: false, repeat: "없음", repeatN: "8" });
  const u = (p) => setF((s) => ({ ...s, ...p }));
  const fee = parseNum(f.fee);
  const repeating = !editing && f.repeat && f.repeat !== "없음";
  const repN = Math.min(Math.max(parseNum(f.repeatN) || 0, 2), 52);
  const groupCnt = editing && editing.groupId ? d.events.filter((e) => e.groupId === editing.groupId).length : 0;
  const save = () => {
    if (!f.date) return;
    const gid = repeating ? "g" + uid() : (editing ? editing.groupId : undefined);
    const ev = {
      id: editing ? editing.id : uid(),
      title: (f.title || "").trim() || "제목 없는 일정",
      typeId: f.typeId, date: f.date, time: f.time || "",
      venue: (f.venue || "").trim(), memo: (f.memo || "").trim(),
      fee, paid: fee > 0 && !repeating ? !!f.paid : false,
      paidDate: fee > 0 && !repeating && f.paid ? (editing && editing.paid && editing.paidDate ? editing.paidDate : todayKey()) : "",
      groupId: gid,
    };
    const extras = [];
    if (repeating) {
      for (let i = 1; i < repN; i++) {
        extras.push({ ...ev, id: uid(), date: repShift(ev.date, f.repeat, i) });
      }
    }
    setD((s) => {
      const events = editing ? s.events.map((e) => (e.id === ev.id ? ev : e)) : [...s.events, ev, ...extras];
      let transactions = s.transactions.filter((t) => t.eventId !== ev.id);
      if (ev.paid && ev.fee > 0 && s.settings.autoLedger) {
        const type = s.settings.eventTypes.find((t) => t.id === ev.typeId);
        const kept = s.transactions.find((t) => t.eventId === ev.id);
        transactions = [...transactions, kept
          ? { ...kept, amount: ev.fee, memo: ev.title + (ev.venue ? " · " + ev.venue : "") }
          : { id: uid(), date: todayKey(), type: "수입", category: type ? (type.perf ? "연주" : type.name) : "기타수입", amount: ev.fee, memo: ev.title + (ev.venue ? " · " + ev.venue : ""), eventId: ev.id }];
      }
      return { ...s, events, transactions };
    });
    close(); show(repeating ? `${f.repeat} 일정 ${repN}개를 추가했어요` : editing ? "일정을 수정했어요" : "일정을 추가했어요");
  };
  const delGroup = () => {
    const ids = d.events.filter((e) => e.groupId === editing.groupId).map((e) => e.id);
    setD((s) => ({ ...s, events: s.events.filter((e) => e.groupId !== editing.groupId), transactions: s.transactions.filter((t) => !ids.includes(t.eventId)) }));
    close(); show(`반복 일정 ${ids.length}개를 삭제했어요`);
  };
  const del = () => {
    setD((s) => ({ ...s, events: s.events.filter((e) => e.id !== editing.id), transactions: s.transactions.filter((t) => t.eventId !== editing.id) }));
    close(); show("일정을 삭제했어요");
  };
  return (
    <Sheet title={editing ? "일정 수정" : "새 일정"} footer={<>{editing && <ConfirmBtn onConfirm={del} />}<Btn style={{ flex: 2 }} onClick={save}>저장</Btn></>}>
      <Fld label="제목"><input className="inp" placeholder="예) 재즈 트리오, 지훈 레슨" value={f.title} onChange={(e) => u({ title: e.target.value })} /></Fld>
      <Fld label="유형">
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          {d.settings.eventTypes.map((t) => <Chip key={t.id} on={f.typeId === t.id} color={t.color} onClick={() => u({ typeId: t.id })}>{t.name}</Chip>)}
        </div>
      </Fld>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Fld label="날짜"><input className="inp" type="date" value={f.date} onChange={(e) => u({ date: e.target.value })} /></Fld>
        <Fld label="시간"><input className="inp" type="time" value={f.time} onChange={(e) => u({ time: e.target.value })} /></Fld>
      </div>
      {!editing && (
        <Fld label="반복">
          <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
            {["없음", "매주", "2주마다", "매월"].map((r) => <Chip key={r} on={f.repeat === r} onClick={() => u({ repeat: r })}>{r}</Chip>)}
          </div>
        </Fld>
      )}
      {repeating && (
        <Fld label="반복 횟수">
          <div style={{ position: "relative" }}>
            <input className="inp" inputMode="numeric" value={f.repeatN} onChange={(e) => u({ repeatN: e.target.value.replace(/[^0-9]/g, "").slice(0, 2) })} style={{ paddingRight: 40 }} />
            <span style={{ position: "absolute", right: 15, top: "50%", transform: "translateY(-50%)", color: C.dim, fontSize: 14, fontWeight: 700 }}>회</span>
          </div>
          <div style={{ fontSize: 12, color: C.faint, marginTop: 7, lineHeight: 1.55 }}>
            {fmtKo(f.date)}부터 {f.repeat} 간격으로 총 {repN}개가 만들어져요 (마지막: {fmtKo(repShift(f.date, f.repeat, repN - 1))}). 만들어진 뒤에는 각각 따로 수정 · 입금 관리할 수 있어요.
          </div>
        </Fld>
      )}
      <Fld label="장소"><input className="inp" placeholder="베뉴 · 연습실 이름" value={f.venue} onChange={(e) => u({ venue: e.target.value })} /></Fld>
      <Fld label="페이"><MoneyInp value={f.fee} onChange={(v) => u({ fee: v })} /></Fld>
      {fee > 0 && !repeating && (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: C.card2, borderRadius: 13, padding: "13px 15px", marginBottom: 15, gap: 10 }}>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700 }}>입금 완료</div>
            <div style={{ fontSize: 11.5, color: C.faint, marginTop: 2 }}>{d.settings.autoLedger ? "켜면 가계부에 수입으로 자동 기록돼요" : "입금 상태를 표시해요"}</div>
          </div>
          <Toggle on={!!f.paid} onChange={(v) => u({ paid: v })} />
        </div>
      )}
      <Fld label="메모"><textarea className="inp" rows={3} placeholder="셋리스트, 준비물, 특이사항..." value={f.memo} onChange={(e) => u({ memo: e.target.value })} /></Fld>
      {groupCnt > 1 && (
        <div style={{ marginTop: 2 }}>
          <ConfirmBtn label={`이 반복 일정 ${groupCnt}개 모두 삭제`} onConfirm={delGroup} style={{ width: "100%" }} />
          <div style={{ fontSize: 12, color: C.faint, marginTop: 8, lineHeight: 1.5 }}>함께 만들어진 반복 일정 전체를 한 번에 지워요. 아래 삭제 버튼은 이 일정 하나만 지워요.</div>
        </div>
      )}
    </Sheet>
  );
}

/* ───────────── 시트: 연주일정 추출 ───────────── */
function ExtractSheet() {
  const { d, close, show } = useApp();
  const [cur, setCur] = useState(nowYM);
  const [ids, setIds] = useState(() => d.settings.eventTypes.filter((t) => t.perf).map((t) => t.id));
  const toggleId = (id) => setIds((s) => (s.includes(id) ? s.filter((x) => x !== id) : [...s, id]));
  const mk = `${cur.y}-${pad(cur.m + 1)}`;
  const text = useMemo(() => {
    const evs = d.events.filter((e) => e.date.startsWith(mk) && ids.includes(e.typeId)).slice().sort(byDT);
    if (!evs.length) return "";
    let out = `🥁 ${cur.m + 1}월 연주 일정`;
    evs.forEach((e) => { out += `\n\n${fmtKo(e.date)}${e.time ? " " + e.time : ""}\n${[e.venue, e.title].filter(Boolean).join(" · ")}`; });
    return out;
  }, [d.events, mk, ids, cur.m]);
  const copy = async () => {
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
    } catch (err) {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (e2) {}
      document.body.removeChild(ta);
    }
    show("연주 일정을 복사했어요"); close();
  };
  return (
    <Sheet title="연주일정 텍스트 추출" footer={<><Btn kind="g" style={{ flex: 1 }} onClick={close}>닫기</Btn><Btn style={{ flex: 2 }} onClick={copy} disabled={!text}>텍스트 복사</Btn></>}>
      <div style={{ display: "flex", justifyContent: "center", marginBottom: 14 }}><MonthNav cur={cur} setCur={setCur} /></div>
      <Fld label="포함할 유형">
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          {d.settings.eventTypes.map((t) => <Chip key={t.id} on={ids.includes(t.id)} color={t.color} onClick={() => toggleId(t.id)}>{t.name}</Chip>)}
        </div>
      </Fld>
      <Lab>미리보기</Lab>
      <div style={{ background: C.card2, border: `1px solid ${C.line2}`, borderRadius: 13, padding: 15, fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap", color: text ? C.text : C.faint, minHeight: 110 }}>
        {text || "이 달에는 선택한 유형의 일정이 없어요."}
      </div>
      <div style={{ fontSize: 12, color: C.faint, marginTop: 10, lineHeight: 1.5 }}>밴드 단톡방이나 SNS 공지에 바로 붙여넣기 좋게 만들어져요.</div>
    </Sheet>
  );
}

/* ───────────── 시트: 베뉴 ───────────── */
function VenueSheet({ init }) {
  const { d, setD, close, show } = useApp();
  const editing = init && init.id ? d.venues.find((v) => v.id === init.id) : null;
  const [f, setF] = useState(() => editing ? { ...editing } : { name: "", person: "", contact: "", status: "연락예정", last: "", memo: "" });
  const u = (p) => setF((s) => ({ ...s, ...p }));
  const save = () => {
    if (!f.name.trim()) return;
    const v = { ...f, id: editing ? editing.id : uid(), name: f.name.trim() };
    setD((s) => ({ ...s, venues: editing ? s.venues.map((x) => (x.id === v.id ? v : x)) : [v, ...s.venues] }));
    close(); show(editing ? "베뉴 정보를 수정했어요" : "베뉴를 추가했어요");
  };
  const del = () => { setD((s) => ({ ...s, venues: s.venues.filter((x) => x.id !== editing.id) })); close(); show("베뉴를 삭제했어요"); };

function SettingsSheet() {

  const doExport = () => { exportBackup(d); show("백업 파일을 내보냈어요"); };
  const onImport = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const obj = JSON.parse(String(reader.result));
        if (!obj || typeof obj !== "object" || !obj.settings) throw new Error("형식 오류");
        setD(normalizeBackup(obj));
        show("백업을 불러와 전체 복원했어요");
      } catch (err) { show("백업 파일을 읽을 수 없어요"); }
    };
    reader.onerror = () => show("파일을 여는 데 실패했어요");
    reader.readAsText(file);
  };
  const addValue = () => { const t = vTxt.trim(); if (!t) return; setS({ values: [...s.values, { id: uid(), text: t }] }); setVTxt(""); };
  const delType = (id) => setD((x) => {
    if (x.settings.eventTypes.length <= 1) return x;
    const rest = x.settings.eventTypes.filter((t) => t.id !== id);
    const fb = rest[rest.length - 1].id;
    return { ...x, settings: { ...x.settings, eventTypes: rest }, events: x.events.map((e) => (e.typeId === id ? { ...e, typeId: fb } : e)) };
  });
  const cycleColor = (id) => setS({ eventTypes: s.eventTypes.map((t) => (t.id === id ? { ...t, color: PALETTE[(PALETTE.indexOf(t.color) + 1) % PALETTE.length] } : t)) });

        </div>
      ))}
      <div style={{ display: "flex", gap: 8 }}>
        <input className="inp" placeholder="새 문장 추가" value={vTxt} onChange={(e) => setVTxt(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addValue()} />
        <Btn style={{ padding: "0 17px" }} onClick={addValue}><Plus size={18} /></Btn>
      </div>

      <H>일정 유형</H>
      <div style={{ fontSize: 12, color: C.faint, marginBottom: 10, lineHeight: 1.5 }}>색 점을 누르면 색이 바뀌고, '연주'를 켜면 연주일정 추출과 홈의 연주 횟수에 포함돼요.</div>
      {s.eventTypes.map((t) => (
        <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 7, background: C.card2, borderRadius: 13, padding: "9px 8px 9px 12px", marginBottom: 8 }}>
          <button onClick={() => cycleColor(t.id)} style={{ width: 22, height: 22, borderRadius: "50%", background: t.color, border: "2px solid rgba(255,255,255,0.15)", flexShrink: 0 }} />
          <input className="inp" style={{ background: "transparent", border: "none", padding: "8px 4px", flex: 1, minWidth: 0, boxShadow: "none" }} value={t.name} onChange={(e) => setS({ eventTypes: s.eventTypes.map((x) => (x.id === t.id ? { ...x, name: e.target.value } : x)) })} />
          <button onClick={() => setS({ eventTypes: s.eventTypes.map((x) => (x.id === t.id ? { ...x, perf: !x.perf } : x)) })} style={{ fontSize: 11.5, fontWeight: 800, padding: "6px 11px", borderRadius: 100, border: `1px solid ${t.perf ? C.gold : C.line2}`, background: t.perf ? C.goldBg : "transparent", color: t.perf ? C.gold : C.faint, flexShrink: 0 }}>연주</button>
          <button className="ib" style={{ padding: 6 }} onClick={() => delType(t.id)}><Trash2 size={14} color={C.faint} /></button>
        </div>
      ))}
      <div style={{ display: "flex", gap: 8 }}>
        <input className="inp" placeholder="새 유형 이름" value={newType} onChange={(e) => setNewType(e.target.value)} />
        <Btn style={{ padding: "0 17px" }} onClick={() => { const n = newType.trim(); if (!n) return; setS({ eventTypes: [...s.eventTypes, { id: uid(), name: n, color: PALETTE[s.eventTypes.length % PALETTE.length], perf: false }] }); setNewType(""); }}><Plus size={18} /></Btn>
      </div>

      <H>가계부 카테고리</H>
      <Lab>수입</Lab>
      <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 10 }}>
        {s.incomeCats.map((c) => (
          <span key={c} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "7px 9px 7px 13px", borderRadius: 100, border: `1px solid ${C.line2}`, fontSize: 13, fontWeight: 700 }}>
            {c}
            {s.incomeCats.length > 1 && <button onClick={() => setS({ incomeCats: s.incomeCats.filter((x) => x !== c) })} style={{ background: "none", border: "none", padding: 2, display: "flex" }}><X size={13} color={C.faint} /></button>}
          </span>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        <input className="inp" placeholder="수입 카테고리 추가" value={newInc} onChange={(e) => setNewInc(e.target.value)} />
        <Btn style={{ padding: "0 17px" }} onClick={() => { const n = newInc.trim(); if (!n || s.incomeCats.includes(n)) return; setS({ incomeCats: [...s.incomeCats, n] }); setNewInc(""); }}><Plus size={18} /></Btn>
      </div>
      <Lab>지출</Lab>
      <div style={{ display: "flex", gap: 7, flexWrap: "wrap", marginBottom: 10 }}>
        {s.expenseCats.map((c) => (
          <span key={c} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "7px 9px 7px 13px", borderRadius: 100, border: `1px solid ${C.line2}`, fontSize: 13, fontWeight: 700 }}>
            {c}
            {s.expenseCats.length > 1 && <button onClick={() => setS({ expenseCats: s.expenseCats.filter((x) => x !== c) })} style={{ background: "none", border: "none", padding: 2, display: "flex" }}><X size={13} color={C.faint} /></button>}
          </span>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8 }}>
        <input className="inp" placeholder="지출 카테고리 추가" value={newExp} onChange={(e) => setNewExp(e.target.value)} />
        <Btn style={{ padding: "0 17px" }} onClick={() => { const n = newExp.trim(); if (!n || s.expenseCats.includes(n)) return; setS({ expenseCats: [...s.expenseCats, n] }); setNewExp(""); }}><Plus size={18} /></Btn>
      </div>

      <H>홈 화면 위젯</H>
      {widgetRows.map(([k, label]) => (
        <div key={k} style={rowBox}>
          <div style={{ fontSize: 14, fontWeight: 700 }}>{label}</div>
          <Toggle on={s.homeWidgets[k] !== false} onChange={(v) => setS({ homeWidgets: { ...s.homeWidgets, [k]: v } })} />
        </div>
      ))}

      <H>연동</H>
      <div style={rowBox}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700 }}>입금 완료 → 가계부 자동 기록</div>
          <div style={{ fontSize: 11.5, color: C.faint, marginTop: 3 }}>일정을 입금 처리하면 수입으로 자동 저장돼요</div>
        </div>
        <Toggle on={!!s.autoLedger} onChange={(v) => setS({ autoLedger: v })} />
      </div>

      <H>백업 · 데이터</H>
      <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={onImport} />
      <Btn kind="g" style={{ width: "100%", marginBottom: 9, border: "1px solid rgba(231,187,84,0.45)", color: C.gold }} onClick={doExport}>백업 파일 내보내기 (.json)</Btn>
      <Btn kind="g" style={{ width: "100%", marginBottom: 9 }} onClick={() => fileRef.current && fileRef.current.click()}>백업 파일 불러오기</Btn>
      <div style={{ fontSize: 12, color: C.faint, margin: "2px 0 18px", lineHeight: 1.6 }}>내보낸 파일(BACKSTAGE-날짜.json)은 다운로드 폴더에 저장돼요 — 파일 앱에서 iCloud Drive로 옮겨두면 안전해요. 불러오기를 하면 현재 데이터가 백업 파일 내용으로 교체돼요.</div>
      <ConfirmBtn label="예시 데이터로 초기화" onConfirm={() => { exportBackup(d); setD(seedData()); show("자동 백업 후 예시 데이터를 불러왔어요"); }} style={{ width: "100%", marginBottom: 9 }} />
      <ConfirmBtn label="모든 데이터 비우기" onConfirm={() => { exportBackup(d); setD(emptyData()); show("자동 백업 후 모두 비웠어요"); }} style={{ width: "100%" }} />
      <div style={{ fontSize: 12, color: C.faint, marginTop: 12, lineHeight: 1.55 }}>초기화 전에 자동으로 백업 파일이 먼저 저장돼요. 악보 파일 자체는 저장할 수 없어 링크 보관 방식을 써요.</div>
    </Sheet>
  );
}

/* ───────────── 시트 라우터 · 헤더 · 내비 ───────────── */
function SheetRouter({ sheet }) {
  const init = sheet.init;
  switch (sheet.k) {
    case "event": return <EventSheet init={init} />;
    case "extract": return <ExtractSheet />;
    case "venue": return <VenueSheet init={init} />;
    case "student": return <StudentSheet init={init} />;
    case "record": return <RecordSheet init={init} />;
    case "task": return <TaskSheet init={init} />;
    case "block": return <BlockSheet init={init} />;
    case "score": return <ScoreSheet init={init} />;
    case "journal": return <JournalSheet init={init} />;
    case "txn": return <TxnSheet init={init} />;
    case "settings": return <SettingsSheet />;
    default: return null;
  }
}

function Header() {
  const { open, saveState } = useApp();
  const sv = saveState === "error"
    ? { t: "저장 실패—백업 필요", c: C.red }
    : saveState === "saved"
      ? { t: "저장됨", c: C.teal }
      : { t: "저장 중", c: C.faint };
  return (
    <header style={{ position: "sticky", top: 0, zIndex: 30, backdropFilter: "blur(16px)", WebkitBackdropFilter: "blur(16px)", background: "rgba(11,11,14,0.82)", borderBottom: `1px solid ${C.line}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "13px 18px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <div style={{ width: 27, height: 27, borderRadius: 9, background: "linear-gradient(135deg, #E7BB54, #B8862E)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <Music4 size={15} color="#17130A" strokeWidth={2.6} />
          </div>
          <div style={{ fontSize: 12.5, fontWeight: 800, letterSpacing: "0.26em", color: C.gold }}>BACKSTAGE</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 2 }}>
          <button onClick={() => open({ k: "settings" })} style={{ display: "flex", alignItems: "center", gap: 5, background: "none", border: "none", padding: "6px 6px" }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", background: sv.c, flexShrink: 0 }} />
            <span style={{ fontSize: 10.5, fontWeight: 800, color: sv.c, whiteSpace: "nowrap" }}>{sv.t}</span>
          </button>
          <button className="ib" onClick={() => open({ k: "settings" })}><Settings size={19} color={C.dim} /></button>
        </div>
      </div>
    </header>
  );
}

const NAV = [
  { k: "home", l: "홈", I: Home },
  { k: "cal", l: "일정", I: CalendarDays },
  { k: "lesson", l: "레슨", I: GraduationCap },
  { k: "prac", l: "연습", I: Music4 },
  { k: "money", l: "머니", I: Wallet },
];

function Nav({ tab, setTab }) {
  return (
    <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 520, zIndex: 35, background: "rgba(13,13,17,0.9)", backdropFilter: "blur(18px)", WebkitBackdropFilter: "blur(18px)", borderTop: `1px solid ${C.line}`, display: "flex", padding: "7px 6px calc(9px + env(safe-area-inset-bottom))" }}>
      {NAV.map(({ k, l, I }) => {
        const on = tab === k;
        return (
          <button key={k} onClick={() => setTab(k)} style={{ flex: 1, background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, padding: "6px 0" }}>
            <I size={21} color={on ? C.gold : C.faint} strokeWidth={on ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: 800, color: on ? C.gold : C.faint }}>{l}</span>
          </button>
        );
      })}
    </nav>
  );
}

function Loading() {
  return (
    <div style={{ minHeight: "100dvh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 14, fontFamily: FONT }}>
      <style>{CSS}</style>
      <div style={{ width: 46, height: 46, borderRadius: 15, background: "linear-gradient(135deg, #E7BB54, #B8862E)", display: "flex", alignItems: "center", justifyContent: "center", animation: "pulse 1.4s infinite" }}>
        <Music4 size={24} color="#17130A" strokeWidth={2.5} />
      </div>
      <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: "0.3em", color: C.gold }}>BACKSTAGE</div>
    </div>
  );
}

/* ───────────── 앱 루트 ───────────── */
function App() {
  const [d, setD] = useState(null);
  const [tab, setTab] = useState("home");
  const [sheet, setSheet] = useState(null);
  const [toast, setToast] = useState(null);
  const [saveState, setSaveState] = useState("saving");
  const saveT = useRef(null);
  const toastT = useRef(null);

  useEffect(() => {
    let alive = true;
    (async () => {
      let loaded = null;
      try {
        const raw = await store.get(KEY);
        if (raw) loaded = JSON.parse(raw);
      } catch (err) { /* 첫 실행 */ }
      if (alive) setD(loaded || seedData());
    })();
    return () => { alive = false; };
  }, []);

  useEffect(() => {
    if (!d) return;
    setSaveState("saving");
    clearTimeout(saveT.current);
    saveT.current = setTimeout(async () => {
      let ok = false;
      try { ok = await store.set(KEY, JSON.stringify(d)); } catch (err) { ok = false; }
      setSaveState(ok ? "saved" : "error");
    }, 700);
    return () => clearTimeout(saveT.current);
  }, [d]);

  const show = (m) => { setToast(m); clearTimeout(toastT.current); toastT.current = setTimeout(() => setToast(null), 1800); };

  const togglePaid = (evId, paid) => setD((s) => {
    const ev0 = s.events.find((e) => e.id === evId);
    if (!ev0) return s;
    const events = s.events.map((e) => (e.id === evId ? { ...e, paid, paidDate: paid ? todayKey() : "" } : e));
    let transactions = s.transactions.filter((t) => t.eventId !== evId);
    if (paid && s.settings.autoLedger && ev0.fee > 0) {
      const type = s.settings.eventTypes.find((t) => t.id === ev0.typeId);
      transactions = [...transactions, { id: uid(), date: todayKey(), type: "수입", category: type ? (type.perf ? "연주" : type.name) : "기타수입", amount: ev0.fee, memo: ev0.title + (ev0.venue ? " · " + ev0.venue : ""), eventId: ev0.id }];
    }
    return { ...s, events, transactions };
  });

  if (!d) return <Loading />;

  const ctx = { d, setD, open: setSheet, close: () => setSheet(null), show, setTab, togglePaid, saveState };

  return (
    <Ctx.Provider value={ctx}>
      <div style={{ minHeight: "100dvh", background: C.bg, color: C.text, fontFamily: FONT, letterSpacing: "-0.01em" }}>
        <style>{CSS}</style>
        <div style={{ maxWidth: 520, margin: "0 auto", minHeight: "100dvh", position: "relative" }}>
          <div style={{ position: "absolute", top: -130, left: "50%", transform: "translateX(-50%)", width: 430, height: 320, background: "radial-gradient(closest-side, rgba(231,187,84,0.09), transparent)", pointerEvents: "none" }} />
          <Header />
          <main style={{ padding: "0 18px 118px", position: "relative" }}>
            {tab === "home" && <HomeTab />}
            {tab === "cal" && <ScheduleTab />}
            {tab === "lesson" && <LessonsTab />}
            {tab === "prac" && <PracticeTab />}
            {tab === "money" && <MoneyTab />}
          </main>
          <Nav tab={tab} setTab={setTab} />
          {sheet && <SheetRouter sheet={sheet} />}
          {toast && <Toast msg={toast} />}
        </div>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
